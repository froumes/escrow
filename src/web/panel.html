    `;
}

function MinecraftHoverTooltip({ tooltip, position }) {
    if (!tooltip) return null;
    const viewportWidth = window.innerWidth || 1280;
    const viewportHeight = window.innerHeight || 720;
    const width = Math.min(420, Math.max(220, viewportWidth - 24));
    let left = position.x + 18;
    if (left + width > viewportWidth - 12) {
        left = Math.max(12, position.x - width - 18);
    }
    let top = position.y + 18;
    if (top > viewportHeight - 180) {
        top = Math.max(12, position.y - 18);
    }

    return ReactDOM.createPortal(
        html`
            <div className="mcTooltip" style=${{ left: `${left}px`, top: `${top}px`, maxWidth: `${width}px` }}>
                <div className="mcTooltipInner">
                    ${tooltip.title ? html`
                        <div className="mcTooltipTitle">
                            <${MinecraftText} text=${tooltip.title} />
                        </div>
                    ` : null}
                    ${(tooltip.lines || []).map((line, index) => html`
                        <div key=${index} className="mcTooltipLine">
                            <${MinecraftText} text=${line} />
                        </div>
                    `)}
                </div>
            </div>
        `,
        document.body
    );
}

function TooltipAnchor({
    as = "div",
    tooltip = null,
    className = "",
    children,
    onMouseEnter,
    onMouseMove,
    onMouseLeave,
    onFocus,
    onBlur,
    ...props
}) {
    const Tag = as;
    const [visible, setVisible] = useState(false);
    const [position, setPosition] = useState({ x: 0, y: 0 });

    const anchorPoint = (event) => {
        const rect = event.currentTarget?.getBoundingClientRect?.();
        return {
            x: event.clientX || (rect ? rect.left + Math.min(rect.width * 0.5, 120) : 0),
            y: event.clientY || (rect ? rect.top + Math.min(rect.height * 0.5, 40) : 0),
        };
    };

    const showTooltip = (event) => {
        if (!tooltip) return;
        setVisible(true);
        setPosition(anchorPoint(event));
    };

    const hideTooltip = () => setVisible(false);

    return html`
        <${React.Fragment}>
            <${Tag}
                className=${cls("mcTooltipAnchor", className)}
                onMouseEnter=${(event) => {
                    showTooltip(event);
                    if (onMouseEnter) onMouseEnter(event);
                }}
                onMouseMove=${(event) => {
                    if (tooltip) {
                        setPosition(anchorPoint(event));
                    }
                    if (onMouseMove) onMouseMove(event);
                }}
                onMouseLeave=${(event) => {
                    hideTooltip();
                    if (onMouseLeave) onMouseLeave(event);
                }}
                onFocus=${(event) => {
                    showTooltip(event);
                    if (onFocus) onFocus(event);
                }}
                onBlur=${(event) => {
                    hideTooltip();
                    if (onBlur) onBlur(event);
                }}
                ...${props}
            >
                ${children}
            </${Tag}>
            ${visible && tooltip ? html`<${MinecraftHoverTooltip} tooltip=${tooltip} position=${position} />` : null}
        </${React.Fragment}>
    `;
}

function ChartCard({ title, subtitle, points, color, fill, height = 300, themeTick = 0 }) {
    const canvasRef = useRef(null);
    const chartRef = useRef(null);
    const themeTickRef = useRef(themeTick);

    useEffect(() => {
        if (!canvasRef.current || !window.Chart) return undefined;

        const styles = getComputedStyle(document.documentElement);
        const lineColor = resolveCssColor(color, styles);
        const fillColor = resolveCssColor(fill, styles);
        const gridColor = styles.getPropertyValue("--chart-grid").trim() || "rgba(255,255,255,.06)";
        const tickColor = styles.getPropertyValue("--chart-ticks").trim() || "#9db2ac";
        const labels = (points || []).map(([ts]) =>
            new Date(ts * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
        );
        const data = (points || []).map(([, value]) => value);

        const themeChanged = themeTickRef.current !== themeTick;
        themeTickRef.current = themeTick;

        if (chartRef.current && !themeChanged) {
            const chart = chartRef.current;
            chart.data.labels = labels;
            chart.data.datasets[0].data = data;
            chart.data.datasets[0].borderColor = lineColor;
            chart.data.datasets[0].backgroundColor = fillColor;
            chart.update("none");
            return undefined;
        }

        if (chartRef.current) chartRef.current.destroy();

        chartRef.current = new Chart(canvasRef.current, {
            type: "line",
            data: {
                labels,
                datasets: [{
                    data,
                    borderColor: lineColor,
                    backgroundColor: fillColor,
                    fill: true,
                    tension: 0.32,
                    pointRadius: 0,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                interaction: { intersect: false, mode: "index" },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: { label: (context) => formatCoinsLong(context.parsed.y) }
                    }
                },
                scales: {
                    x: {
                        grid: { color: gridColor },
                        ticks: { color: tickColor, maxTicksLimit: 6 }
                    },
                    y: {
                        grid: { color: gridColor },
                        ticks: { color: tickColor, callback: (value) => coins(value) }
                    }
                }
            }
        });

        return () => {
            if (chartRef.current) {
                chartRef.current.destroy();
                chartRef.current = null;
            }
        };
    }, [points, color, fill, themeTick]);

    return html`
        <${Panel}>
            <div className="cardBody">
                <div className="sectionTitle">
                    <div>
                        <span className="eyebrow">Profit</span>
                        <h2 className="panelTitle">${title}</h2>
                        ${subtitle ? html`<p>${subtitle}</p>` : null}
                    </div>
                </div>
                <div className="chartWrap" style=${{ height: `${height}px` }}>
                    <canvas ref=${canvasRef}></canvas>
                </div>
            </div>
        </${Panel}>
    `;
}

function InventoryPanel({ title, subtitle, slots }) {
    const list = Array.isArray(slots) ? slots : [];
    const defaultIndex = Math.max(0, list.findIndex((slot) => !slot?.empty && (slot?.name || slot?.displayName)));
    const [activeIndex, setActiveIndex] = useState(defaultIndex);

    useEffect(() => {
        if (!list.length) {
            setActiveIndex(0);
            return;
        }
        if (activeIndex >= list.length || activeIndex < 0) {
            setActiveIndex(Math.max(0, list.findIndex((slot) => !slot?.empty && (slot?.name || slot?.displayName))));
        }
    }, [list, activeIndex]);

    const selected = list[activeIndex] || list[defaultIndex] || {};
    const selectedName = slotName(selected);
    const selectedIcon = slotIconUrl(selected);
    const selectedTooltip = getTooltipData(selected);
    const selectedTitle = selected?.displayNameColored || selected?.displayName || selectedName;

    return html`
        <${Panel}>
            <div className="cardBody">
                <div className="sectionTitle">
                    <div>
                        <span className="eyebrow">Inspection</span>
                        <h2 className="panelTitle">${title}</h2>
                        <p>${subtitle}</p>
                    </div>
                    <div className="tagList">
                        <span className="tag">${list.length} slots</span>
                        ${selected?.tag ? html`<span className="tag mono">${selected.tag}</span>` : null}
                    </div>
                </div>

                ${!list.length ? html`<div className="emptyState">No slot data yet.</div>` : html`
                    <div className="inventoryLayout">
                        <div className="inventoryBoard">
                            <div className="inventoryBoardBar">
                                <div className="inventoryBoardTitle">
                                    <strong>${title}</strong>
                                    <span>Hover for tooltip, click to inspect</span>
                                </div>
                                <span className="inventoryHint">${list.length} slots</span>
                            </div>

                            <div className="slotGrid">
                                ${list.map((slot, index) => {
                                    const empty = slot?.empty || (!slot?.name && !slot?.displayName);
                                    const icon = slotIconUrl(slot);
                                    const label = slotName(slot);
                                    const tooltip = getTooltipData(slot);
                                    return html`
                                        <${TooltipAnchor}
                                            key=${`${slot?.slot ?? index}-${label}`}
                                            as="button"
                                            type="button"
                                            tooltip=${tooltip}
                                            aria-label=${empty ? `Empty slot ${slot?.slot ?? index}` : `${label} in slot ${slot?.slot ?? index}`}
                                            className=${cls("slotButton", empty && "empty", activeIndex === index && "active")}
                                            onClick=${() => setActiveIndex(index)}
                                        >
                                            <span className="slotId">#${slot?.slot ?? index}</span>
                                            <div className="slotIcon">
                                                ${icon && !empty ? html`
                                                    <img src=${icon} alt=${label} onError=${(event) => { event.currentTarget.style.display = "none"; }} />
                                                ` : html`
                                                    <span className="slotFallback">${empty ? "Empty" : label.slice(0, 20)}</span>
                                                `}
                                            </div>
                                            ${!empty && Number(slot?.count) > 1 ? html`<span className="slotCount">${slot.count}</span>` : null}
                                        </${TooltipAnchor}>
                                    `;
                                })}
                            </div>
                        </div>

                        <div className="inventoryInspector">
                        <div className="detailCard">
                            <div className="detailTop">
                                <${TooltipAnchor} tooltip=${selectedTooltip} className="inline">
                                <div className="slotIcon">
                                    ${selectedIcon && !selected?.empty ? html`
                                        <img src=${selectedIcon} alt=${selectedName} onError=${(event) => { event.currentTarget.style.display = "none"; }} />
                                    ` : html`
                                        <span className="slotFallback">${selected?.empty ? "Empty" : selectedName.slice(0, 24)}</span>
                                    `}
                                </div>
                                </${TooltipAnchor}>
                                <${TooltipAnchor} tooltip=${selectedTooltip} className="inline">
                                <div>
                                    <span className="eyebrow">Selected Slot</span>
                                    <h3 className="detailTitle"><${MinecraftText} text=${selectedTitle} /></h3>
                                    <div className="detailMeta">
                                        <span className="tag">Slot ${selected?.slot ?? activeIndex}</span>
                                        <span className="tag">Count ${selected?.count ?? 0}</span>
                                        ${selected?.tag ? html`<span className="tag mono">${selected.tag}</span>` : null}
                                    </div>
                                </div>
                                </${TooltipAnchor}>
                            </div>

                            <div className="miniList">
                                <div className="miniRow"><strong>Registry</strong><span className="mono">${selected?.name || "-"}</span></div>
                                <div className="miniRow"><strong>Display Name</strong><span>${selected?.displayName ? stripMc(selected.displayName) : "-"}</span></div>
                                <div className="miniRow"><strong>Colored Name</strong><span>${selected?.displayNameColored ? html`<${MinecraftText} text=${selected.displayNameColored} />` : "-"}</span></div>
                            </div>
                        </div>
                        </div>
                    </div>
                `}
            </div>
        </${Panel}>
    `;
}

function MarketTableCard({ title, subtitle, rows, emptyText, columns, detailRenderer, keyFn, summaryTags }) {
    const safeRows = Array.isArray(rows) ? rows : [];
    const initialKey = safeRows.length ? keyFn(safeRows[0], 0) : null;
    const [selectedKey, setSelectedKey] = useState(initialKey);

    useEffect(() => {
        if (!safeRows.length) {
            setSelectedKey(null);
            return;
        }
        const currentExists = safeRows.some((row, index) => keyFn(row, index) === selectedKey);
        if (!currentExists) {
            setSelectedKey(keyFn(safeRows[0], 0));
        }
    }, [safeRows, selectedKey, keyFn]);

    const selectedRow = safeRows.find((row, index) => keyFn(row, index) === selectedKey) || safeRows[0] || null;

    return html`
        <${Panel}>
            <div className="cardBody">
                <div className="sectionTitle">
                    <div>
                        <span className="eyebrow">Market</span>
                        <h2 className="panelTitle">${title}</h2>
                        <p>${subtitle}</p>
                    </div>
                    <div className="tagList">
                        ${(summaryTags || []).map((tag, index) => html`<span className="tag" key=${index}>${tag}</span>`)}
                    </div>
                </div>

                ${!safeRows.length ? html`
                    <div className="emptyState">${emptyText}</div>
                ` : html`
                    <div className="tableShell">
                        <div className="tableWrap">
                            <table>
                                <thead>
                                    <tr>
                                        ${columns.map((column) => html`<th key=${column.label}>${column.label}</th>`)}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${safeRows.map((row, index) => {
                                        const rowKey = keyFn(row, index);
                                        return html`
                                            <tr
                                                key=${rowKey}
                                                className=${selectedKey === rowKey ? "selected" : ""}
                                                onClick=${() => setSelectedKey(rowKey)}
                                            >
                                                ${columns.map((column) => html`
                                                    <td key=${column.label}>
                                                        ${column.render ? column.render(row, index) : row[column.key]}
                                                    </td>
                                                `)}
                                            </tr>
                                        `;
                                    })}
                                </tbody>
                            </table>
                        </div>

                        <div className="detailCard">
                            ${selectedRow ? detailRenderer(selectedRow) : html`<div className="muted">No row selected.</div>`}
                        </div>
                    </div>
                `}
            </div>
        </${Panel}>
    `;
}

function QueueCard({ status, queue }) {
    const entries = Array.isArray(queue) ? queue : [];
    return html`
        <${Panel}>
            <div className="cardBody">
                <div className="sectionTitle">
                    <div>
                        <span className="eyebrow">Queue</span>
                        <h2 className="panelTitle">Current work and limits</h2>
                        <p>See what is executing right now and whether the runtime is blocked by limits or inventory pressure.</p>
                    </div>
                </div>

                <div className="kpiStrip">
                    <div className="kpi"><small>Runtime State</small><strong>${humanizeIdentifier(status.state)}</strong></div>
                    <div className="kpi"><small>Bazaar Limit</small><strong>${status.bazaar_at_limit ? "Reached" : "Clear"}</strong></div>
                    <div className="kpi"><small>Auction Limit</small><strong>${status.auction_at_limit ? "Reached" : "Clear"}</strong></div>
                    <div className="kpi"><small>Inventory</small><strong>${status.inventory_full ? "Full" : "Has Space"}</strong></div>
                </div>

                ${entries.length ? html`
                    <div className="queueList">
                        ${entries.map((entry, index) => html`
                            <div className=${cls("queueEntry", entry.executing && "executing")} key=${`${entry.display_name}-${index}`}>
                                <div>
                                    <h3>${entry.display_name}</h3>
                                    <p>${entry.executing ? "Executing now" : "Waiting in queue"} · Priority ${entry.priority}</p>
                                </div>
                                <div className="tagList">
                                    <span className="tag">${ageFromMs(entry.age_ms)}</span>
                                    ${entry.executing ? html`<span className="tag tone-green">Active</span>` : null}
                                </div>
                            </div>
                        `)}
                    </div>
                ` : html`<div className="emptyState">Command queue is empty.</div>`}
            </div>
        </${Panel}>
    `;
}

function LoginOverlay({ show, password, setPassword, error, onLogin, publicProfit, themeTick = 0 }) {
    if (!show) return null;

    const sessionCombined = mergeProfitSeries(publicProfit.session_ah_points, publicProfit.session_bz_points);
    const sessionTotal = publicProfit.session_total || ((publicProfit.session_ah_total || 0) + (publicProfit.session_bz_total || 0));
    const allTimeTotal = publicProfit.all_time_total || ((publicProfit.all_time_ah_total || 0) + (publicProfit.all_time_bz_total || 0));
    const sessionPerHour = publicProfit.session_per_hour || (
        publicProfit.session_uptime_seconds ? sessionTotal / (publicProfit.session_uptime_seconds / 3600) : 0
    );

    return html`
        <div className="overlay">
            <div className="overlayGrid">
                <${Panel}>
                    <div className="loginPanel">
                        <span className="eyebrow">Secure Access</span>
                        <h2>Unlock the local TWM panel.</h2>
                        <p className="subtle">
                            The local UI is protected by the web GUI password when one is configured. Authenticate once and the session cookie keeps the panel usable.
                        </p>

                        <input
                            className="loginField"
                            type="password"
                            value=${password}
                            placeholder="Web GUI password"
                            autoComplete="current-password"
                            onInput=${(event) => setPassword(event.target.value)}
                            onKeyDown=${(event) => {
                                if (event.key === "Enter") onLogin();
                            }}
                        />

                        ${error ? html`<div className="loginError">${error}</div>` : null}

                        <div className="loginActions">
                            <${Button} kind="primary" onClick=${onLogin}>Unlock Panel</${Button}>
                            <a className="button secondary" href="https://github.com/froumes/escrow" target="_blank" rel="noreferrer">Repository</a>
                        </div>

                        <div className="miniList">
                            <div className="miniRow"><strong>What stays public</strong><span>Only anonymized profit summary and OG stats.</span></div>
                            <div className="miniRow"><strong>What stays locked</strong><span>Runtime controls, config, inventory, market state, and chat.</span></div>
                        </div>
                    </div>
                </${Panel}>

                <${Panel}>
                    <div className="cardBody">
                        <div className="sectionTitle">
                            <div>
                                <span className="eyebrow">Public Snapshot</span>
                                <h2 className="panelTitle">Session pace and all-time profit</h2>
                                <p>The public view keeps session performance separate from lifetime totals so the pace number stays believable.</p>
                            </div>
                        </div>

                        <div className="statGrid">
                            <${StatCard} label="Session AH" value=${coins(publicProfit.session_ah_total || 0)} tone="tone-green" />
                            <${StatCard} label="Session BZ" value=${coins(publicProfit.session_bz_total || 0)} tone="tone-blue" />
                            <${StatCard} label="Session Total" value=${coins(sessionTotal)} tone="tone-gold" sub=${`${coins(sessionPerHour)}/hr`} />
                            <${StatCard} label="All-Time Total" value=${coins(allTimeTotal)} tone="tone-gold" sub="Persists across restarts" />
                        </div>

                        <div style=${{ marginTop: "18px" }}>
                            <${ChartCard}
                                title="Combined session curve"
                                subtitle=${`Session uptime ${uptime(publicProfit.session_uptime_seconds || 0)}`}
                                points=${sessionCombined}
                                color="var(--blue)"
                                fill="var(--chart-fill-blue)"
                                height=${280}
                                themeTick=${themeTick}
                            />
                        </div>
                    </div>
                </${Panel}>
            </div>
        </div>
    `;
}

function App() {
    const [activeTab, setActiveTab] = useState("dashboard");
    const [needsAuth, setNeedsAuth] = useState(false);
    const [password, setPassword] = useState("");
    const [loginError, setLoginError] = useState("");
    const [toast, setToast] = useState("");
    const [lastRefresh, setLastRefresh] = useState(null);

    const [status, setStatus] = useState({});
    const [profit, setProfit] = useState({
        all_time_ah_points: [],
        all_time_bz_points: [],
        all_time_ah_total: 0,
        all_time_bz_total: 0,
        session_ah_points: [],
        session_bz_points: [],
        session_ah_total: 0,
        session_bz_total: 0,
        session_uptime_seconds: 0
    });
    const [publicProfit, setPublicProfit] = useState({
        all_time_ah_total: 0,
        all_time_bz_total: 0,
        all_time_total: 0,
        session_ah_total: 0,
        session_bz_total: 0,
        session_total: 0,
        session_per_hour: 0,
        session_uptime_seconds: 0,
        session_ah_points: [],
        session_bz_points: []
    });
    const [inventory, setInventory] = useState({ slots: [] });
    const [gameView, setGameView] = useState({ open: false, slots: [] });
    const [auctions, setAuctions] = useState([]);
    const [bzOrders, setBzOrders] = useState([]);
    const [queue, setQueue] = useState([]);
    const [configText, setConfigText] = useState("");
    const [savedConfigText, setSavedConfigText] = useState("");
    const [configMsg, setConfigMsg] = useState("");
    const [chatInput, setChatInput] = useState("");
    const [chat, setChat] = useState([]);
    const [chatConnected, setChatConnected] = useState(false);
    const [chatFilter, setChatFilter] = useState("");
    const [chatPaused, setChatPaused] = useState(false);
    const [chatAutoSuspended, setChatAutoSuspended] = useState(false);
    const [chatUnread, setChatUnread] = useState(0);
    const [chatReconnectAttempts, setChatReconnectAttempts] = useState(0);
    const [lastChatConnectedAt, setLastChatConnectedAt] = useState(null);
    const [chatEvictionNotice, setChatEvictionNotice] = useState("");
    const [chatPulseTick, setChatPulseTick] = useState(0);
    const [toastVisible, setToastVisible] = useState(false);
    const [newChatStartIndex, setNewChatStartIndex] = useState(null);
    const renderedTab = activeTab;
    const [statusPulseTick, setStatusPulseTick] = useState(0);
    const [themeTick, setThemeTick] = useState(0);
    const [notifications, setNotifications] = useState([]);
    const [notifSoundEnabled, setNotifSoundEnabled] = useState(() => {
        const saved = localStorage.getItem("twm_notif_sound");
        return saved !== "false";
    });
    const notifSoundEnabledRef = useRef(notifSoundEnabled);
    const notifNextIdRef = useRef(1);
    const pushNotificationRef = useRef(null);

    const chatBoxRef = useRef(null);
    const chatNextIdRef = useRef(1);
    const chatPausedRef = useRef(false);
    const chatSuspendedRef = useRef(false);
    const chatReconnectAttemptsRef = useRef(0);
    const toastTimerRef = useRef(null);
    const toastExitTimerRef = useRef(null);
    const chatFlashTimerRef = useRef(null);
    const previousChatLengthRef = useRef(0);

    const flash = useCallback((message) => {
        setToast(message);
        setToastVisible(true);
        if (toastTimerRef.current) window.clearTimeout(toastTimerRef.current);
        if (toastExitTimerRef.current) window.clearTimeout(toastExitTimerRef.current);
        toastTimerRef.current = window.setTimeout(() => setToastVisible(false), 2200);
        toastExitTimerRef.current = window.setTimeout(() => setToast(""), 2600);
    }, []);

    const pushNotification = useCallback((flipEvent) => {
        const id = notifNextIdRef.current++;
        const notif = { id, ...flipEvent, ts: Date.now(), exiting: false };
        setNotifications((prev) => [...prev.slice(-6), notif]);
        window.setTimeout(() => {
            setNotifications((prev) => prev.map((n) => n.id === id ? { ...n, exiting: true } : n));
        }, 5000);
        window.setTimeout(() => {
            setNotifications((prev) => prev.filter((n) => n.id !== id));
        }, 5400);
    }, []);

    const dismissNotification = useCallback((id) => {
        setNotifications((prev) => prev.map((n) => n.id === id ? { ...n, exiting: true } : n));
        window.setTimeout(() => {
            setNotifications((prev) => prev.filter((n) => n.id !== id));
        }, 300);
    }, []);

    const toggleNotifSound = useCallback(() => {
        setNotifSoundEnabled((prev) => {
            const next = !prev;
            localStorage.setItem("twm_notif_sound", String(next));
            return next;
        });
    }, []);

    const handleUnauthorized = useCallback(() => {
        setNeedsAuth(true);
        setChatConnected(false);
    }, []);

    const loadJson = useCallback(async (url, setter, { silent = true } = {}) => {
        try {
            const value = await req(url);
            setter(value);
            setNeedsAuth(false);
            setLoginError("");
            return value;
        } catch (error) {
            if (error.status === 401) {
                handleUnauthorized();
            } else if (!silent) {
                flash(error.message || "Request failed");
            }
            return null;
        }
    }, [flash, handleUnauthorized]);

    const loadConfig = useCallback(async ({ silent = true } = {}) => {
        try {
            const text = await req(API.config);
            setConfigText(text);
            setSavedConfigText(text);
            setConfigMsg("");
            setNeedsAuth(false);
            setLoginError("");
            return text;
        } catch (error) {
            if (error.status === 401) {
                handleUnauthorized();
            } else if (!silent) {
                setConfigMsg(error.message || "Failed to load config");
                flash(error.message || "Failed to load config");
            }
            return null;
        }
    }, [flash, handleUnauthorized]);

    const refreshCore = useCallback(async () => {
        const results = await Promise.all([
            loadJson(API.status, setStatus),
            loadJson(API.profit, setProfit),
            loadJson(API.queue, setQueue)
        ]);
        if (results.some(Boolean)) {
            setLastRefresh(Date.now());
        }
    }, [loadJson]);

    const refreshSurface = useCallback(async () => {
        await Promise.all([
            loadJson(API.inventory, setInventory),
            loadJson(API.gameView, setGameView)
        ]);
    }, [loadJson]);

    const refreshMarket = useCallback(async () => {
        await Promise.all([
            loadJson(API.auctions, setAuctions),
            loadJson(API.bazaarOrders, setBzOrders)
        ]);
    }, [loadJson]);

    const refreshEverything = useCallback(async () => {
        await Promise.all([refreshCore(), refreshSurface(), refreshMarket()]);
    }, [refreshCore, refreshSurface, refreshMarket]);

    const post = useCallback(async (url, body, successMessage) => {
        const options = { method: "POST" };
        if (body != null) {
            options.headers = { "Content-Type": "application/json" };
            options.body = JSON.stringify(body);
        }

        try {
            await req(url, options);
            if (successMessage) flash(successMessage);
            await refreshEverything();
        } catch (error) {
            if (error.status === 401) {
                handleUnauthorized();
            } else {
                flash(error.message || "Request failed");
            }
        }
    }, [flash, handleUnauthorized, refreshEverything]);

    const login = useCallback(async () => {
        try {
            await req(API.login, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password })
            });
            setNeedsAuth(false);
            setLoginError("");
            flash("Panel unlocked");
            await refreshEverything();
            await loadConfig();
        } catch (error) {
            setLoginError("Invalid password");
        }
    }, [password, flash, refreshEverything, loadConfig]);

    const saveConfig = useCallback(async () => {
        try {
            await req(API.config, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ config_toml: configText })
            });
            setSavedConfigText(configText);
            setConfigMsg("Config saved");
            flash("Config saved");
            await refreshCore();
        } catch (error) {
            if (error.status === 401) {
                handleUnauthorized();
            } else {
                setConfigMsg(error.message || "Config save failed");
                flash(error.message || "Config save failed");
            }
        }
    }, [configText, flash, handleUnauthorized, refreshCore]);

    const sendChat = useCallback(async () => {
        if (!chatInput.trim()) return;
        try {
            await req(API.chatSend, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: chatInput.trim() })
            });
            setChatInput("");
            flash("Chat sent");
        } catch (error) {
            if (error.status === 401) {
                handleUnauthorized();
            } else {
                flash(error.message || "Failed to send chat");
            }
        }
    }, [chatInput, flash, handleUnauthorized]);

    const clearChat = useCallback(() => {
        setChat([]);
        setChatUnread(0);
        setChatEvictionNotice("");
    }, []);

    const exportChat = useCallback(() => {
        const payload = {
            exported_at: new Date().toISOString(),
            count: chat.length,
            messages: chat
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `chat-export-${Date.now()}.json`;
        anchor.click();
        URL.revokeObjectURL(url);
        flash("Chat exported");
    }, [chat, flash]);

    const jumpToBottom = useCallback(() => {
        const box = chatBoxRef.current;
        if (!box) return;
        box.scrollTop = box.scrollHeight;
        setChatAutoSuspended(false);
        setChatUnread(0);
    }, []);

    useEffect(() => {
        req(API.publicProfit)
            .then(setPublicProfit)
            .catch(() => {});
        refreshEverything();
        loadConfig();
    }, [refreshEverything, loadConfig]);

    const updateThemeMeta = useCallback(() => {
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) {
            const styles = getComputedStyle(document.documentElement);
            meta.setAttribute("content", styles.getPropertyValue("--theme-color").trim() || "#0d1214");
        }
    }, []);

    useEffect(() => {
        updateThemeMeta();
    }, [updateThemeMeta]);

    useEffect(() => {
        const media = window.__twmTheme?.media || window.matchMedia("(prefers-color-scheme: dark)");
        const onChange = () => {
            if (getThemePreference() === "auto") {
                window.__twmTheme?.applyTheme?.("auto");
                setThemeTick((tick) => tick + 1);
                updateThemeMeta();
            }
        };
        media.addEventListener("change", onChange);
        return () => media.removeEventListener("change", onChange);
    }, [updateThemeMeta]);

    useEffect(() => {
        const interval = window.setInterval(() => {
            req(API.publicProfit).then(setPublicProfit).catch(() => {});
        }, 15000);
        return () => window.clearInterval(interval);
    }, []);

    useEffect(() => {
        if (needsAuth) return undefined;

        const tick = () => {
            refreshCore();
            if (activeTab === "dashboard" || activeTab === "inventory") {
                refreshSurface();
            }
            if (activeTab === "dashboard" || activeTab === "market") {
                refreshMarket();
            }
        };

        tick();
        const interval = window.setInterval(tick, 5000);
        return () => window.clearInterval(interval);
    }, [needsAuth, activeTab, refreshCore, refreshSurface, refreshMarket]);

    useEffect(() => {
        if (activeTab === "config" && !configText) {
            loadConfig();
        }
    }, [activeTab, configText, loadConfig]);

    useEffect(() => {
        if (!Object.keys(status || {}).length) return;
        setStatusPulseTick((tick) => tick + 1);
    }, [status.state, status.macro_paused, status.current_account]);

    useEffect(() => {
        if (activeTab !== "config") return undefined;
        const onKeyDown = (event) => {
            if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "s") {
                event.preventDefault();
                saveConfig();
            }
        };
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
    }, [activeTab, saveConfig]);

    useEffect(() => {
        chatPausedRef.current = chatPaused;
    }, [chatPaused]);

    useEffect(() => {
        chatSuspendedRef.current = chatAutoSuspended;
    }, [chatAutoSuspended]);

    useEffect(() => {
        notifSoundEnabledRef.current = notifSoundEnabled;
    }, [notifSoundEnabled]);

    useEffect(() => {
        pushNotificationRef.current = pushNotification;
    }, [pushNotification]);

    useEffect(() => {
        if (needsAuth) return undefined;

        let socket;
        let closed = false;
        let reconnectTimer = null;
        let warnedAuthMigration = false;

        const connect = () => {
            socket = new WebSocket(API.chatWs());
            socket.onopen = () => {
                setChatConnected(true);
                setChatPulseTick((tick) => tick + 1);
            };
            socket.onmessage = (event) => {
                const raw = event.data;
                const normalized = normalizeChatMessages(raw).map((entry) => ({
                    id: chatNextIdRef.current++,
                    text: stripMc(entry.text),
                    ts: entry.ts,
                    source: entry.source || "ws"
                }));
                if (!normalized.length) return;

                const flipEvent = detectFlipEvent(typeof raw === "string" ? raw : normalized[0]?.text || "");
                if (flipEvent) {
                    if (pushNotificationRef.current) pushNotificationRef.current(flipEvent);
                    if (notifSoundEnabledRef.current) playNotifDing();
                }

                const shouldAutoScroll = !chatPausedRef.current && !chatSuspendedRef.current;
                setChat((previous) => {
                    const pruned = pruneChatMessages([...previous, ...normalized]);
                    if (pruned.evicted > 0) {
                        setChatEvictionNotice(`Evicted ${pruned.evicted} older message${pruned.evicted === 1 ? "" : "s"} to keep memory bounded.`);
                    }
                    return pruned.messages;
                });
                if (shouldAutoScroll) {
                    setChatUnread(0);
                } else {
                    setChatUnread((count) => count + normalized.length);
                }
            };
            socket.onerror = () => {
                setChatConnected(false);
            };
            socket.onclose = () => {
                setChatConnected(false);
                if (!closed && !warnedAuthMigration) {
                    warnedAuthMigration = true;
                    console.warn(
                        "[WebGUI] Chat websocket closed. If you use a custom client, remove '?token=' from the WS URL and authenticate via twm_session cookie or Authorization header."
                    );
                }
                if (!closed) {
                    chatReconnectAttemptsRef.current += 1;
                    setChatReconnectAttempts(chatReconnectAttemptsRef.current);
                    reconnectTimer = window.setTimeout(connect, 3000);
                }
            };
        };

        connect();

        return () => {
            closed = true;
            setChatConnected(false);
            if (reconnectTimer) window.clearTimeout(reconnectTimer);
            if (socket && socket.readyState <= 1) {
                socket.close();
            }
        };
    }, [needsAuth]);

                                        <${Button}
                                            kind="danger"
                                            onClick=${() => post(API.cancelAuction, { item_name: row.item_name, starting_bid: row.starting_bid }, "Auction cancel queued")}
                                        >
                                            Queue Cancel Auction
                                        </${Button}>
                                    </div>
                                </div>
                            `}
                        />

                        <${MarketTableCard}
                            title="Bazaar orders"
                            subtitle="Tracked Bazaar orders with side, size, price, and fill state."
                            rows=${bzOrders || []}
                            emptyText="No active bazaar orders found."
                            columns=${bzColumns}
                            keyFn=${(row, index) => `${row.item_name}-${row.is_buy_order}-${row.placed_at || index}-${index}`}
                            summaryTags=${[
                                `${activeBzCount} orders`,
                                `${buyOrders} buy`,
                                `${sellOrders} sell`,
                                `${filledOrders} filled`
                            ]}
                            detailRenderer=${(row) => html`
                                <div>
                                    <span className="eyebrow">Order Detail</span>
                                    <h3 className="detailTitle">${row.item_name}</h3>
                                    <div className="detailMeta">
                                        <span className="tag">${row.is_buy_order ? "Buy order" : "Sell order"}</span>
                                        <span className="tag">${row.status || "open"}</span>
                                        <span className="tag">${formatPlacedAt(row.placed_at)}</span>
                                    </div>
                                    <div className="miniList">
                                        <div className="miniRow"><strong>Amount</strong><span>${Number(row.amount || 0).toLocaleString()}</span></div>
                                        <div className="miniRow"><strong>Price per unit</strong><span>${formatCoinsLong(row.price_per_unit)}</span></div>
                                        <div className="miniRow"><strong>Placed</strong><span>${formatPlacedAt(row.placed_at)}</span></div>
                                    </div>
                                    <div style=${{ marginTop: "14px" }}>
                                        <${Button}
                                            kind="danger"
                                            onClick=${() => post(API.cancelBz, { item_name: row.item_name, is_buy_order: row.is_buy_order }, "Bazaar cancel queued")}
                                        >
                                            Queue Cancel Order
                                        </${Button}>
                                    </div>
                                </div>
                            `}
                        />
                    </div>
                ` : null}

                ${renderedTab === "queue" ? html`
                    <${QueueCard} status=${status} queue=${queue} />
                ` : null}

                ${renderedTab === "config" ? html`
                    <${Panel}>
                        <div className="cardBody">
                            <div className="sectionTitle">
                                <div>
                                    <span className="eyebrow">Config</span>
                                    <h2 className="panelTitle">Raw TOML editor with safer affordances</h2>
                                    <p>Save, reload, and download logs from the same place. Ctrl/Cmd + S also saves while this tab is open.</p>
                                </div>
                                <div className="configTools">
                                    <span className=${cls("pill", dirtyConfig ? "tone-gold" : "tone-green")}>
                                        ${dirtyConfig ? "Unsaved changes" : "Saved"}
                                    </span>
                                    <${Button} kind="primary" onClick=${saveConfig}>Save Config</${Button}>
                                    <${Button} kind="secondary" onClick=${() => loadConfig({ silent: false })}>Reload From Disk</${Button}>
                                    <${Button} kind="ghost" onClick=${() => { window.location.href = API.logsLatest; }}>Download Latest Log</${Button}>
                                </div>
                            </div>

                            ${configMsg ? html`<div className="configMsg">${configMsg}</div>` : null}

                            <textarea
                                className="configArea"
                                value=${configText}
                                onInput=${(event) => setConfigText(event.target.value)}
                                spellCheck="false"
                            ></textarea>
                        </div>
                    </${Panel}>
                ` : null}

                ${renderedTab === "chat" ? html`
                    <${Panel}>
                        <div className="cardBody">
                            <div className="sectionTitle">
                                <div>
                                    <span className="eyebrow">Chat</span>
                                    <h2 className="panelTitle">Live console stream and command composer</h2>
                                    <p>Watch chat in one pane and send commands in another without the current cramped split.</p>
                                </div>
                                <div className="chatStatus">
                                    <span key=${chatPulseTick} className=${cls("dot", chatConnected && "live", chatConnected && "reconnectPulse")}></span>
                                    <span>${chatConnected ? "WebSocket connected" : "Reconnecting chat stream"}</span>
                                </div>
                            </div>

                            <div className="chatLayout">
                                <div>
                                    <div className="chatFrame">
                                        <div
                                            className="chatBox"
                                            ref=${chatBoxRef}
                                            onScroll=${(event) => {
                                                const box = event.target;
                                                const nearBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 72;
                                                if (nearBottom) {
                                                    setChatAutoSuspended(false);
                                                    setChatUnread(0);
                                                } else if (!chatPaused) {
                                                    setChatAutoSuspended(true);
                                                }
                                            }}
                                        >
                                            ${filteredChat.length ? filteredChat.map((line) => html`
                                                <div key=${line.id} className="chatLine">
                                                    <div className="chatMeta">
                                                        <span className="chatTime">${new Date(line.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" })}</span>
                                                        <span className="chatBadge">${line.source || "ws"}</span>
                                                    </div>
                                                    <div className="chatBody">${line.text}</div>
                                                </div>
                                            `) : html`<div className="emptyState">Waiting for chat traffic...</div>`}
                                        </div>
                                        ${chatUnread > 0 ? html`
                                            <${Button} className="chatJump" kind="primary" size="small" onClick=${jumpToBottom}>
                                                New messages (${chatUnread})
                                            </${Button}>
                                        ` : null}
                                    </div>
                                    ${chatEvictionNotice ? html`<div className="chatHint">${chatEvictionNotice}</div>` : null}
                                </div>

                                <div className="composer">
                                    <textarea
                                        value=${chatInput}
                                        placeholder="Type in-game chat, /cofl commands, or compatibility commands here..."
                                        onInput=${(event) => setChatInput(event.target.value)}
                                        onKeyDown=${(event) => {
                                            if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
                                                event.preventDefault();
                                                sendChat();
                                                return;
                                            }
                                            if (event.key === "Enter" && !event.shiftKey) {
                                                event.preventDefault();
                                                sendChat();
                                            }
                                        }}
                                    ></textarea>

                                    <div className="presetRow">
                                        <${Button} kind="secondary" size="small" onClick=${() => setChatInput("/cofl ping")}>Insert /cofl ping</${Button}>
                                        <${Button} kind="secondary" size="small" onClick=${() => setChatInput("/bz")}>Insert /bz</${Button}>
                                        <${Button} kind="secondary" size="small" onClick=${() => setChatInput("/ah")}>Insert /ah</${Button}>
                                        <${Button} kind="secondary" size="small" onClick=${() => setChatInput("/baf")}>Insert /baf</${Button}>
                                    </div>

                                    <div className="miniList">
                                        <div className="miniRow"><strong>Send message</strong><span>Press Enter or Ctrl/Cmd + Enter to send. Use Shift + Enter for a new line.</span></div>
                                        <div className="miniRow"><strong>Console history</strong><span>Recent lines are kept in memory for this browser session.</span></div>
                                    </div>

                                    <div className="actionRow">
                                        <${Button} kind="primary" onClick=${sendChat}>Send Chat</${Button}>
                                        <${Button} kind="ghost" onClick=${() => setChatInput("")}>Clear Draft</${Button}>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </${Panel}>
                ` : null}
                </div>
            </div>

            ${toast ? html`<div className=${cls("toast", !toastVisible && "toast-exit")}>${toast}</div>` : null}

            ${notifications.length > 0 ? html`
                <div className="notifStack">
                    ${notifications.map((n) => html`
                        <div key=${n.id} className=${cls("notifCard", n.exiting && "notif-exit")} onClick=${() => dismissNotification(n.id)}>
                            <div className=${cls("notifIcon", n.type === "bz" ? "bz" : "ah")}>
                                ${n.type === "bz" ? "BZ" : "AH"}
                            </div>
                            <div className="notifBody">
                                <div className="notifTitle">${n.item || "Flip"}</div>
                                <div className="notifSub">${n.type === "bz" ? `Bazaar ${n.side} order placed` : "Auction flip purchased"}</div>
                            </div>
                            <span className="notifTime">${new Date(n.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" })}</span>
                        </div>
                    `)}
                </div>
            ` : null}

            <${LoginOverlay}
                show=${needsAuth}
                password=${password}
                setPassword=${setPassword}
                error=${loginError}
                onLogin=${login}
                publicProfit=${publicProfit}
                themeTick=${themeTick}
            />
        </main>
    `;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
