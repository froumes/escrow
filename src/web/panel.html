<!DOCTYPE html>
<html lang="en">

<title>TWM Control Panel</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

<style>
:root{--bg:#05070c;--bg2:#0a1220;--surface:rgba(255,255,255,.06);--surface2:rgba(255,255,255,.10);--border:rgba(255,255,255,.12);--dim:#97a6bf;--text:#edf3ff;--pink:#ff4d8d;--blue:#5aa7ff;--green:#39d98a;--gold:#f5c55a;--red:#ff6b7d;--shadow:0 24px 80px rgba(0,0,0,.42);--glow:0 0 42px rgba(90,167,255,.15),0 0 34px rgba(255,77,141,.11)}*{box-sizing:border-box}html,body{margin:0;min-height:100%}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 12% 20%,rgba(255,77,141,.16),transparent 24%),radial-gradient(circle at 82% 18%,rgba(90,167,255,.18),transparent 26%),linear-gradient(180deg,var(--bg2),var(--bg));overflow-x:hidden}body:before,body:after{content:"";position:fixed;border-radius:999px;filter:blur(120px);pointer-events:none}body:before{top:-120px;left:50%;width:460px;height:460px;transform:translateX(-50%);background:rgba(255,77,141,.16)}body:after{right:-80px;top:24%;width:380px;height:380px;background:rgba(90,167,255,.14)}a{color:inherit;text-decoration:none}button,input,textarea{font:inherit}button{border:0;cursor:pointer;background:none;color:inherit}textarea,input{width:100%;color:var(--text);background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:18px;outline:none}textarea:focus,input:focus{border-color:rgba(90,167,255,.7)}#root{min-height:100vh;position:relative;z-index:1}.app{max-width:1520px;margin:0 auto;padding:20px}.glass{position:relative;overflow:hidden;border-radius:28px;border:1px solid var(--border);background:linear-gradient(180deg,var(--surface2),var(--surface));backdrop-filter:blur(22px);box-shadow:var(--shadow)}.glass:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.03) 36%,transparent 60%);pointer-events:none}.inner{position:relative;z-index:1}.header{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 22px;margin-bottom:18px;flex-wrap:wrap}.tabs,.actions,.stats{display:flex;flex-wrap:wrap;gap:10px}.tab,.btn,.chip{padding:10px 15px;border-radius:999px;border:1px solid rgba(255,255,255,.08);transition:transform .18s ease,background .18s ease}.tab{background:rgba(255,255,255,.04);color:var(--dim)}.tab.active{background:linear-gradient(135deg,var(--pink),var(--blue));color:#fff;box-shadow:var(--glow);border-color:transparent}.tab:hover,.btn:hover{transform:translateY(-1px)}.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:22px;padding:26px}.kicker{font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:var(--blue)}.headline{margin:14px 0 0;font-size:clamp(2.2rem,4vw,4.5rem);line-height:.96;letter-spacing:-.06em;font-weight:900;max-width:10ch}.headline span{background:linear-gradient(90deg,#fff,var(--pink) 44%,var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent}.sub{margin-top:18px;color:var(--dim);line-height:1.8;max-width:64ch}.btn{font-weight:700}.primary{background:linear-gradient(135deg,var(--pink),var(--blue));box-shadow:var(--glow)}.secondary{background:rgba(255,255,255,.05)}.success{background:linear-gradient(135deg,var(--green),#79e3a9);color:#08140d}.warn{background:linear-gradient(135deg,var(--gold),#ffd78f);color:#241700}.danger{background:linear-gradient(135deg,var(--red),var(--pink))}.grid2,.grid3{display:grid;gap:18px;margin-top:18px}.grid2{grid-template-columns:.9fr 1.1fr}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}.card{padding:22px}.title{margin:0;font-size:1.55rem;font-weight:900;letter-spacing:-.04em}.metricGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.metric{padding:15px;border-radius:20px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.035)}.metric small{display:block;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.2em}.metric strong{display:block;margin-top:10px;font-size:1.6rem;letter-spacing:-.05em}.blue{color:var(--blue)}.pink{color:var(--pink)}.green{color:var(--green)}.gold{color:var(--gold)}.red{color:var(--red)}.panel{margin-top:18px}.chart{height:280px}.inv{display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:10px}.slot{position:relative;padding:10px;border-radius:18px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.035)}.slothead{color:var(--dim);font-size:10px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}.slotbody{display:flex;align-items:center;justify-content:center;aspect-ratio:1;border-radius:14px;background:rgba(0,0,0,.22);overflow:hidden}.slotbody img{width:42px;height:42px;object-fit:contain}.slotname{margin-top:8px;font-size:11px;line-height:1.4;color:var(--dim)}.slotcount{position:absolute;right:10px;bottom:10px;padding:2px 8px;border-radius:999px;background:rgba(0,0,0,.5);font-size:10px;font-weight:800}.tableWrap{overflow-x:auto}table{width:100%;border-collapse:collapse}th,td{padding:14px 12px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;vertical-align:top}th{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.18em;font-weight:600}code{white-space:pre-wrap;word-break:break-word;color:#abd4ff}.empty{padding:40px 16px;text-align:center;color:var(--dim)}.chat{min-height:430px;max-height:540px;overflow:auto;border:1px solid rgba(255,255,255,.07);border-radius:22px;background:rgba(0,0,0,.22);padding:16px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.line{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}.toast{position:fixed;right:22px;bottom:22px;padding:14px 18px;border-radius:999px;background:rgba(0,0,0,.58);border:1px solid var(--border);box-shadow:var(--glow);backdrop-filter:blur(18px)}.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,.68);backdrop-filter:blur(18px);z-index:20}.overlayGrid{width:min(1080px,100%);display:grid;grid-template-columns:.9fr 1.1fr;gap:18px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.muted{color:var(--dim)}@media(max-width:1180px){.hero,.grid2,.grid3,.overlayGrid{grid-template-columns:1fr}}@media(max-width:900px){.inv{grid-template-columns:repeat(5,minmax(0,1fr))}.metricGrid{grid-template-columns:1fr 1fr}}@media(max-width:640px){.app{padding:12px}.header,.hero,.card{padding:16px}.headline{font-size:2.3rem;max-width:none}.metricGrid{grid-template-columns:1fr}.inv{grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.actions{flex-direction:column}.btn{width:100%}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useMemo,useRef,useCallback}=React;const html=htm.bind(React.createElement);
const API={status:"/api/status",login:"/api/login",profit:"/api/profit",publicProfit:"/api/profit/public",inventory:"/api/inventory",gameView:"/api/game-view",auctions:"/api/auctions",bazaarOrders:"/api/bazaar_orders",queue:"/api/queue",config:"/api/config",pause:"/api/pause",resume:"/api/resume",toggleAh:"/api/toggle_ah",toggleBazaar:"/api/toggle_bazaar",toggleAnon:"/api/toggle_anonymize",switchAccount:"/api/switch_account",claimPurchases:"/api/claim_purchases",collectBz:"/api/collect_bz_orders",claimBz:"/api/claim_bz_orders",cancelAllBz:"/api/cancel_all_bz_orders",cancelAuction:"/api/cancel_auction",cancelBz:"/api/cancel_bz_order",chatSend:"/api/chat/send",chatWs:()=>`${location.protocol==="https:"?"wss":"ws"}://${location.host}/api/chat/ws`};
const cls=(...x)=>x.filter(Boolean).join(" ");const stripMc=t=>(t||"").replace(/\u00A7[0-9a-fk-or]/gi,"");
const coins=v=>v==null||Number.isNaN(v)?"-":Math.abs(v)>=1e9?`${(v/1e9).toFixed(2)}B`:Math.abs(v)>=1e6?`${(v/1e6).toFixed(2)}M`:Math.abs(v)>=1e3?`${(v/1e3).toFixed(1)}K`:`${Math.round(v)}`;
function uptime(s){if(s==null||Number.isNaN(s))return "-";s=Math.max(0,Math.floor(s));const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60),sec=s%60;return d>0?`${d}d ${h}h ${m}m`:h>0?`${h}h ${m}m ${sec}s`:`${m}m ${sec}s`;}
async function req(url,opt={}){const r=await fetch(url,opt);if(r.status===401){const e=new Error("Unauthorized");e.status=401;throw e}if(!r.ok){const t=await r.text().catch(()=>""),e=new Error(t||`HTTP ${r.status}`);e.status=r.status;throw e}const ct=r.headers.get("content-type")||"";return ct.includes("json")?r.json():r.text()}
const Card=({className,children})=>html`<section className=${cls("glass",className)}><div className="inner">${children}</div></section>`;
const Btn=({children,variant="primary",className,...props})=>html`<button className=${cls("btn",variant,className)} ...${props}>${children}</button>`;
const Metric=({label,value,accent})=>html`<div className="metric"><small>${label}</small><strong className=${accent}>${value}</strong></div>`;
function ChartCard({title,sub,points,color,fill}){const ref=useRef(null),chart=useRef(null);useEffect(()=>{if(!ref.current||!window.Chart)return;chart.current&&chart.current.destroy();chart.current=new Chart(ref.current,{type:"line",data:{labels:(points||[]).map(p=>new Date(p[0]*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})),datasets:[{data:(points||[]).map(p=>p[1]),borderColor:color,backgroundColor:fill,fill:true,tension:.34,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#91a2bb",maxTicksLimit:6}},y:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#91a2bb",callback:v=>coins(v)}}}}});return()=>{chart.current&&chart.current.destroy();chart.current=null}},[points,color,fill]);return html`<${Card} className="card"><div style=${{fontSize:"15px",fontWeight:700}}>${title}</div><div className="muted" style=${{fontSize:"12px",marginTop:"4px",marginBottom:"12px"}}>${sub}</div><div className="chart"><canvas ref=${ref}></canvas></div></${Card}>`}
function Inv({title,label,slots}){const arr=Array.isArray(slots)?slots:[];return html`<${Card} className="card"><div style=${{fontSize:"15px",fontWeight:700}}>${title}</div><div className="muted" style=${{fontSize:"12px",marginTop:"4px",marginBottom:"14px"}}>${label} - ${arr.length} slots</div>${!arr.length?html`<div className="empty">No data yet.</div>`:html`<div className="inv">${arr.map((s,i)=>{const empty=s.empty||(!s.name&&!s.displayName),name=stripMc(s.displayName||s.name||"Empty"),tag=name.toUpperCase().replace(/[^A-Z0-9]+/g,"_").replace(/^_+|_+$/g,""),src=!empty&&tag?`https://sky.coflnet.com/static/icon/${tag}`:"";return html`<div className="slot" key=${`${s.slot??i}-${name}`}><div className="slothead">#${s.slot??i}</div><div className="slotbody">${src?html`<img src=${src} alt=${name} onError=${e=>{e.currentTarget.style.display="none"}} />`:html`<span className="muted" style=${{fontSize:"11px",textAlign:"center",padding:"0 6px"}}>${empty?"Empty":name.slice(0,18)}</span>`}</div>${!empty&&s.count>1?html`<div className="slotcount">${s.count}</div>`:null}<div className="slotname">${empty?"No item":name}</div></div>`})}</div>`}</${Card}>`}
function Table({title,rows,cols,empty,keyFn}){const safe=Array.isArray(rows)?rows:[];return html`<${Card} className="card"><div style=${{fontSize:"15px",fontWeight:700,marginBottom:"14px"}}>${title}</div>${!safe.length?html`<div className="empty">${empty}</div>`:html`<div className="tableWrap"><table><thead><tr>${cols.map(c=>html`<th key=${c.label}>${c.label}</th>`)}</tr></thead><tbody>${safe.map((r,i)=>html`<tr key=${keyFn?keyFn(r,i):i}>${cols.map(c=>html`<td key=${c.label}>${c.render?c.render(r):r[c.key]}</td>`)}</tr>`)}</tbody></table></div>`}</${Card}>`}
function Overlay({show,password,setPassword,error,onLogin,profit}){if(!show)return null;const total=(profit.ah_total||0)+(profit.bz_total||0),combined=(profit.ah_points||[]).map((p,i)=>[p[0],p[1]+(((profit.bz_points||[])[i]||[0,0])[1]||0)]);return html`<div className="overlay"><div className="overlayGrid"><${Card} className="card"><div className="kicker">Secure Access</div><h2 className="title" style=${{marginTop:"10px"}}>TWM Web Console</h2><p className="sub">Enter your web GUI password to unlock the live panel.</p><input style=${{marginTop:"18px",padding:"14px 16px"}} type="password" value=${password} placeholder="Password" autoComplete="current-password" onInput=${e=>setPassword(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter")onLogin()}} />${error?html`<div style=${{color:"var(--red)",marginTop:"10px"}}>${error}</div>`:null}<div className="actions"><${Btn} onClick=${onLogin}>Unlock</${Btn}><a className="btn secondary" href="https://github.com/froumes/escrow" target="_blank" rel="noreferrer">GitHub</a></div></${Card}><${Card} className="card"><div className="kicker">Public Snapshot</div><h2 className="title" style=${{marginTop:"10px"}}>Profit pulse before login</h2><div className="metricGrid panel"><${Metric} label="AH Profit" value=${coins(profit.ah_total||0)} accent="green" /><${Metric} label="BZ Profit" value=${coins(profit.bz_total||0)} accent="blue" /><${Metric} label="Total" value=${coins(total)} accent="pink" /></div><div className="panel"><${ChartCard} title="Combined session curve" sub=${`Uptime ${uptime(profit.uptime_seconds||0)}`} points=${combined} color="#5aa7ff" fill="rgba(90,167,255,.16)" /></div></${Card}></div></div>`}
function App(){const [needsAuth,setNeedsAuth]=useState(false),[password,setPassword]=useState(""),[loginError,setLoginError]=useState(""),[status,setStatus]=useState({}),[profit,setProfit]=useState({ah_points:[],bz_points:[],ah_total:0,bz_total:0,uptime_seconds:0}),[publicProfit,setPublicProfit]=useState({ah_points:[],bz_points:[],ah_total:0,bz_total:0,uptime_seconds:0}),[inventory,setInventory]=useState({slots:[]}),[gameView,setGameView]=useState({open:false,slots:[]}),[auctions,setAuctions]=useState([]),[bzOrders,setBzOrders]=useState([]),[queue,setQueue]=useState([]),[configText,setConfigText]=useState(""),[configMsg,setConfigMsg]=useState(""),[chatInput,setChatInput]=useState(""),[chat,setChat]=useState([]),[tab,setTab]=useState("overview"),[toast,setToast]=useState("");
const flash=useCallback(m=>{setToast(m);clearTimeout(window.__twmToast);window.__twmToast=setTimeout(()=>setToast(""),2800)},[]);
const load=useCallback((url,setter)=>req(url).then(v=>{setter(v);setNeedsAuth(false);setLoginError("")}).catch(e=>{if(e.status===401)setNeedsAuth(true)}),[]);
const refresh=useCallback(()=>{load(API.status,setStatus);load(API.profit,setProfit);load(API.inventory,setInventory);load(API.gameView,setGameView);load(API.auctions,setAuctions);load(API.bazaarOrders,setBzOrders);load(API.queue,setQueue)},[load]);
const loadConfig=useCallback(()=>load(API.config,setConfigText),[load]);
useEffect(()=>{req(API.publicProfit).then(setPublicProfit).catch(()=>{});refresh();loadConfig()},[refresh,loadConfig]);
useEffect(()=>{const ws=new WebSocket(API.chatWs());ws.onmessage=e=>setChat(p=>[...p.slice(-249),e.data]);return()=>ws.close()},[]);
useEffect(()=>{if(needsAuth)return;const a=setInterval(refresh,5000),b=setInterval(()=>req(API.publicProfit).then(setPublicProfit).catch(()=>{}),15000);return()=>{clearInterval(a);clearInterval(b)}},[needsAuth,refresh]);
const post=useCallback((url,body,msg)=>{const opt={method:"POST"};if(body){opt.headers={"Content-Type":"application/json"};opt.body=JSON.stringify(body)}return req(url,opt).then(()=>{msg&&flash(msg);refresh()}).catch(e=>{if(e.status===401)setNeedsAuth(true);else flash(e.message||"Request failed")})},[flash,refresh]);
const login=useCallback(()=>req(API.login,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password})}).then(()=>{setNeedsAuth(false);setLoginError("");flash("Panel unlocked");refresh();loadConfig()}).catch(()=>setLoginError("Invalid password")),[password,flash,refresh,loadConfig]);
const saveConfig=useCallback(()=>req(API.config,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({config_toml:configText})}).then(()=>{setConfigMsg("Config saved");flash("Config saved");refresh()}).catch(e=>setConfigMsg(e.message||"Config save failed")),[configText,flash,refresh]);
const sendChat=useCallback(()=>{if(!chatInput.trim())return;post(API.chatSend,{message:chatInput},"Chat sent");setChatInput("")},[chatInput,post]);
const total=(profit.ah_total||0)+(profit.bz_total||0),perHour=profit.uptime_seconds?total/(profit.uptime_seconds/3600):0,combined=(profit.ah_points||[]).map((p,i)=>[p[0],p[1]+(((profit.bz_points||[])[i]||[0,0])[1]||0)]);
const auctionCols=useMemo(()=>[{label:"Item",render:r=>html`<div><div style=${{fontWeight:700}}>${r.item_name}</div><div className="muted" style=${{fontSize:"12px",marginTop:"3px"}}>${r.bin?"BIN auction":"Auction"}</div></div>`},{label:"Start",render:r=>`${coins(r.starting_bid)} coins`},{label:"Highest",render:r=>`${coins(r.highest_bid)} coins`},{label:"Ends In",render:r=>uptime(Math.max(0,r.time_remaining_seconds||0))},{label:"Actions",render:r=>html`<${Btn} variant="secondary" className="mono" onClick=${()=>post(API.cancelAuction,{item_name:r.item_name,starting_bid:r.starting_bid},"Auction cancel queued")}>Cancel</${Btn}>`}],[post]);
const bzCols=useMemo(()=>[{label:"Item",key:"item_name"},{label:"Type",render:r=>r.is_buy_order?"Buy":"Sell"},{label:"Amount",render:r=>String(r.amount??"-")},{label:"Price",render:r=>`${coins(r.price_per_unit)} coins`},{label:"Actions",render:r=>html`<${Btn} variant="secondary" className="mono" onClick=${()=>post(API.cancelBz,{item_name:r.item_name,is_buy_order:r.is_buy_order},"Bazaar cancel queued")}>Cancel</${Btn}>`}],[post]);
const queueCols=useMemo(()=>[{label:"Priority",key:"priority"},{label:"Command",render:r=>html`<code>${JSON.stringify(r.command_type,null,2)}</code>`}],[]);
const tabs=[["overview","Overview"],["profit","Profit"],["inventory","Inventory"],["market","Market"],["queue","Queue"],["config","Config"],["chat","Chat"]];
return html`<main className="app"><${Card} className="header"><div className="inner" style=${{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",gap:"16px",flexWrap:"wrap"}}><div><div className="kicker">Built-In Web GUI</div><div style=${{fontSize:"1.9rem",fontWeight:900,letterSpacing:"-.05em",marginTop:"8px"}}>TWM Local Control</div></div><nav className="tabs">${tabs.map(([k,l])=>html`<button key=${k} className=${cls("tab",tab===k&&"active")} onClick=${()=>setTab(k)}>${l}</button>`)}</nav></div></${Card}><${Card} className="hero"><div className="inner"><div className="kicker">Live Control Surface</div><h1 className="headline">TWM command deck <span>for faster flips and cleaner runtime control.</span></h1><p className="sub">The local web GUI now runs without in-browser Babel or Tailwind CDN. Profit history persists across restarts, and the panel still talks to the same Rust endpoints.</p><div className="actions"><${Btn} variant="warn" onClick=${()=>post(API.pause,null,"Macro paused")}>Pause Macro</${Btn}><${Btn} variant="success" onClick=${()=>post(API.resume,null,"Macro resumed")}>Resume Macro</${Btn}><${Btn} variant="secondary" onClick=${()=>post(API.claimPurchases,null,"Claim purchases queued")}>Claim Purchases</${Btn}><${Btn} variant="secondary" onClick=${()=>post(API.collectBz,null,"Collect BZ queued")}>Collect BZ</${Btn}><${Btn} variant="secondary" onClick=${()=>post(API.claimBz,null,"Claim BZ queued")}>Claim BZ</${Btn}><${Btn} variant="danger" onClick=${()=>post(API.cancelAllBz,null,"Cancel all BZ queued")}>Cancel All BZ</${Btn}></div></div><div className="inner"><div className="metricGrid"><${Metric} label="State" value=${status.state||"-"} /><${Metric} label="Queue Depth" value=${String(status.queue_depth??"-")} /><${Metric} label="Purse" value=${status.purse!=null?`${coins(status.purse)} coins`:"-"} accent="blue" /><${Metric} label="Uptime" value=${uptime(status.uptime_seconds)} accent="pink" /><${Metric} label="Account" value=${status.current_account||"-"} /><${Metric} label="Macro" value=${status.macro_paused?"Paused":"Running"} accent=${status.macro_paused?"gold":"green"} /></div></div></${Card}>
${tab==="overview"?html`<section className="grid2"><${Card} className="card"><div className="kicker">Runtime Controls</div><h2 className="title" style=${{marginTop:"10px"}}>Live toggles and account switching</h2><p className="sub">Quick toggles for core runtime features without leaving the local panel.</p><div className="actions"><${Btn} variant=${status.enable_ah_flips?"primary":"secondary"} onClick=${()=>post(API.toggleAh,{enabled:!status.enable_ah_flips},`AH flips ${!status.enable_ah_flips?"enabled":"disabled"}`)}>Auction Flips: ${status.enable_ah_flips?"On":"Off"}</${Btn}><${Btn} variant=${status.enable_bazaar_flips?"primary":"secondary"} onClick=${()=>post(API.toggleBazaar,{enabled:!status.enable_bazaar_flips},`Bazaar flips ${!status.enable_bazaar_flips?"enabled":"disabled"}`)}>Bazaar Flips: ${status.enable_bazaar_flips?"On":"Off"}</${Btn}><${Btn} variant=${status.anonymize_webhook_name?"primary":"secondary"} onClick=${()=>post(API.toggleAnon,{enabled:!status.anonymize_webhook_name},`Anonymize ${!status.anonymize_webhook_name?"enabled":"disabled"}`)}>Anonymize: ${status.anonymize_webhook_name?"On":"Off"}</${Btn}></div><div className="metricGrid panel">${(status.accounts||[]).map((a,i)=>html`<button key=${`${a}-${i}`} className="metric" onClick=${()=>post(API.switchAccount,{index:i},`Switching to ${a}`)}><small>Account ${i+1}</small><strong>${a}</strong></button>`)}</div></${Card}><div><${Card} className="card"><div className="kicker">Session Snapshot</div><h2 className="title" style=${{marginTop:"10px"}}>Profit at a glance</h2><div className="metricGrid panel"><${Metric} label="AH Profit" value=${coins(profit.ah_total)} accent="green" /><${Metric} label="BZ Profit" value=${coins(profit.bz_total)} accent="blue" /><${Metric} label="Total" value=${coins(total)} accent="pink" /><${Metric} label="Per Hour" value=${`${coins(perHour)}/hr`} accent="gold" /></div></${Card}><div className="panel"><${Inv} title=${gameView.open?`Open Window: ${gameView.title||"Unknown"}`:"Live Window View"} label=${gameView.open?`Window ${gameView.windowId||"-"}`:"Game view"} slots=${gameView.slots||[]} /></div></div></section>`:null}
${tab==="profit"?html`<section className="grid3"><${ChartCard} title="Auction house profit" sub=${`Total ${coins(profit.ah_total)} - persisted across restarts`} points=${profit.ah_points||[]} color="#39d98a" fill="rgba(57,217,138,.17)" /><${ChartCard} title="Bazaar profit" sub=${`Total ${coins(profit.bz_total)} - persisted across restarts`} points=${profit.bz_points||[]} color="#5aa7ff" fill="rgba(90,167,255,.16)" /><${ChartCard} title="Combined curve" sub=${`Uptime ${uptime(profit.uptime_seconds)} - ${coins(perHour)}/hr`} points=${combined} color="#ff4d8d" fill="rgba(255,77,141,.15)" /></section>`:null}
${tab==="inventory"?html`<section className="grid2"><${Inv} title="Inventory" label="Player inventory" slots=${inventory.slots||[]} /><${Inv} title="Game View" label=${gameView.open?(gameView.title||"Window"):"No active window"} slots=${gameView.slots||[]} /></section>`:null}
${tab==="market"?html`<section className="grid2"><${Table} title="Active Auctions" rows=${auctions||[]} cols=${auctionCols} empty="No active auctions found." keyFn=${r=>r.uuid||r.item_name} /><${Table} title="Bazaar Orders" rows=${bzOrders||[]} cols=${bzCols} empty="No active bazaar orders found." keyFn=${(r,i)=>`${r.item_name}-${r.is_buy_order}-${i}`} /></section>`:null}
${tab==="queue"?html`<section className="grid2"><${Card} className="card"><div className="kicker">Bot Condition</div><h2 className="title" style=${{marginTop:"10px"}}>Queue and limits</h2><div className="metricGrid panel"><${Metric} label="Bazaar Limit" value=${status.bazaar_at_limit?"Reached":"Clear"} accent=${status.bazaar_at_limit?"gold":"green"} /><${Metric} label="Auction Limit" value=${status.auction_at_limit?"Reached":"Clear"} accent=${status.auction_at_limit?"gold":"green"} /><${Metric} label="Inventory" value=${status.inventory_full?"Full":"Has Space"} accent=${status.inventory_full?"red":"green"} /><${Metric} label="Current State" value=${status.state||"-"} /></div></${Card}><${Table} title="Command Queue" rows=${queue||[]} cols=${queueCols} empty="Command queue is empty." /></section>`:null}
${tab==="config"?html`<section className="panel"><${Card} className="card"><div style=${{display:"flex",justifyContent:"space-between",alignItems:"end",gap:"16px",flexWrap:"wrap"}}><div><div className="kicker">Config File</div><h2 className="title" style=${{marginTop:"10px"}}>Raw config editor</h2><p className="sub">Edit the local TOML config directly and save it through the built-in API.</p></div><div className="actions" style=${{marginTop:0}}><${Btn} onClick=${saveConfig}>Save Config</${Btn}><${Btn} variant="secondary" onClick=${loadConfig}>Reload</${Btn}></div></div>${configMsg?html`<div className="metric panel">${configMsg}</div>`:null}<textarea className="mono" style=${{minHeight:"540px",padding:"18px",marginTop:"18px"}} value=${configText} onInput=${e=>setConfigText(e.target.value)}></textarea></${Card}></section>`:null}
${tab==="chat"?html`<section className="grid2"><${Card} className="card"><div className="kicker">Live Console</div><h2 className="title" style=${{marginTop:"10px"}}>Chat stream</h2><div className="chat panel">${!(chat||[]).length?html`<div className="muted">Waiting for chat traffic...</div>`:(chat||[]).map((m,i)=>html`<div className="line" key=${i}>${stripMc(m)}</div>`)}</div></${Card}><${Card} className="card"><div className="kicker">Send Commands</div><h2 className="title" style=${{marginTop:"10px"}}>Chat input</h2><p className="sub">Use this for in-game chat, COFL commands, and the compatibility command surface.</p><textarea style=${{minHeight:"180px",padding:"16px",marginTop:"18px"}} value=${chatInput} placeholder="Type a message or command..." onInput=${e=>setChatInput(e.target.value)}></textarea><div className="actions"><${Btn} onClick=${sendChat}>Send Chat</${Btn}><${Btn} variant="secondary" onClick=${()=>setChatInput("/cofl ping")}>Insert /cofl ping</${Btn}><${Btn} variant="secondary" onClick=${()=>setChatInput("/baf")}>Insert /baf</${Btn}></div></${Card}></section>`:null}
${toast?html`<div className="toast">${toast}</div>`:null}<${Overlay} show=${needsAuth} password=${password} setPassword=${setPassword} error=${loginError} onLogin=${login} profit=${publicProfit} /></main>`}
ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
