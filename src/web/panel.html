<!DOCTYPE html>
<html lang="en">
<head>

<title>TWM - Control Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
tailwind.config = { theme: { extend: { colors: { bg:'#05070c', dim:'#99a6bd', pink:'#ff4d8d', blue:'#5aa7ff', green:'#39d98a', gold:'#f7b955', red:'#ff6b7d' }, boxShadow: { glow:'0 0 60px rgba(90,167,255,0.16),0 0 48px rgba(255,77,141,0.12)' } } } };
</script>
<style>
html,body{min-height:100%;background:radial-gradient(circle at 15% 20%,rgba(255,77,141,.16),transparent 26%),radial-gradient(circle at 85% 25%,rgba(90,167,255,.18),transparent 28%),#05070c;color:#edf3ff;margin:0;font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#root{min-height:100vh}.glass{background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 80px rgba(0,0,0,.45);backdrop-filter:blur(22px)}
.glass:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.16),rgba(255,255,255,.02) 38%,transparent 60%);pointer-events:none}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.10);border-radius:999px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const API = { status:'/api/status', login:'/api/login', profit:'/api/profit', publicProfit:'/api/profit/public', inventory:'/api/inventory', gameView:'/api/game-view', auctions:'/api/auctions', bazaarOrders:'/api/bazaar_orders', queue:'/api/queue', config:'/api/config', pause:'/api/pause', resume:'/api/resume', toggleAh:'/api/toggle_ah', toggleBazaar:'/api/toggle_bazaar', toggleAnon:'/api/toggle_anonymize', switchAccount:'/api/switch_account', claimPurchases:'/api/claim_purchases', collectBz:'/api/collect_bz_orders', claimBz:'/api/claim_bz_orders', cancelAllBz:'/api/cancel_all_bz_orders', cancelAuction:'/api/cancel_auction', cancelBz:'/api/cancel_bz_order', chatSend:'/api/chat/send', chatWs:()=>`${location.protocol==='https:'?'wss':'ws'}://${location.host}/api/chat/ws` };
const cls=(...x)=>x.filter(Boolean).join(' ');
const coins=v=>v==null?'-':Math.abs(v)>=1e9?`${(v/1e9).toFixed(2)}B`:Math.abs(v)>=1e6?`${(v/1e6).toFixed(2)}M`:Math.abs(v)>=1e3?`${(v/1e3).toFixed(1)}K`:`${Math.round(v)}`;
const uptime=s=>s==null?'-':(d=>d?`${d}d ${Math.floor(s%86400/3600)}h ${Math.floor(s%3600/60)}m`:(h=>h?`${h}h ${Math.floor(s%3600/60)}m ${Math.floor(s%60)}s`:`${Math.floor(s/60)}m ${Math.floor(s%60)}s`)(Math.floor(s/3600)))(Math.floor(s/86400));
const stripMc=t=>(t||'').replace(/§[0-9a-fk-or]/gi,'');
async function req(url,opts={}){const r=await fetch(url,opts);if(r.status===401){const e=new Error('Unauthorized');e.status=401;throw e}if(!r.ok){const t=await r.text().catch(()=>''),e=new Error(t||`HTTP ${r.status}`);e.status=r.status;throw e}const ct=r.headers.get('content-type')||'';return ct.includes('json')?r.json():r.text()}
function Card({className='',children}){return <div className={cls('glass relative overflow-hidden rounded-[28px]',className)}><div className="relative z-10">{children}</div></div>}
function Btn({children,className='',v='primary',...props}){const m={primary:'bg-gradient-to-r from-pink to-blue text-white shadow-glow',secondary:'border border-white/10 bg-white/5 text-white/90',success:'bg-gradient-to-r from-green to-emerald-400 text-slate-950',warn:'bg-gradient-to-r from-gold to-amber-300 text-slate-950',danger:'bg-gradient-to-r from-red to-pink text-white'};return <button className={cls('rounded-full px-5 py-3 text-sm font-semibold transition hover:-translate-y-0.5',m[v],className)} {...props}>{children}</button>}
function Metric({label,value,accent='text-white'}){return <div className="rounded-[22px] border border-white/8 bg-white/5 p-4"><div className="text-[11px] uppercase tracking-[.22em] text-dim">{label}</div><div className={cls('mt-3 text-2xl font-black tracking-[-.05em]',accent)}>{value}</div></div>}
function ChartCard({title,sub,points,color,fill}){const ref=useRef(null),chart=useRef(null);useEffect(()=>{if(!ref.current||!window.Chart)return;chart.current&&chart.current.destroy();chart.current=new Chart(ref.current,{type:'line',data:{labels:(points||[]).map(p=>new Date(p[0]*1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})),datasets:[{data:(points||[]).map(p=>p[1]),borderColor:color,backgroundColor:fill,fill:true,tension:.35,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#8ea0bb',maxTicksLimit:6}},y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#8ea0bb',callback:v=>coins(v)}}}}});return()=>chart.current&&chart.current.destroy()},[points,color,fill]);return <Card className="p-5"><div className="mb-3"><div className="text-sm font-semibold text-white">{title}</div><div className="mt-1 text-xs text-dim">{sub}</div></div><div className="h-64"><canvas ref={ref}></canvas></div></Card>}
function Grid({title,slots,label}){const arr=Array.isArray(slots)?slots:[];return <Card className="p-5"><div className="mb-4"><div className="text-sm font-semibold text-white">{title}</div><div className="mt-1 text-xs text-dim">{label} · {arr.length} slots</div></div>{!arr.length?<div className="rounded-[22px] border border-dashed border-white/10 bg-white/3 px-4 py-10 text-center text-sm text-dim">No data yet.</div>:<div className="grid grid-cols-5 gap-3 sm:grid-cols-7 lg:grid-cols-9">{arr.map((s,i)=>{const empty=s.empty||(!s.name&&!s.displayName),name=stripMc(s.displayName||s.name||'Empty'),tag=name.toUpperCase().replace(/[^A-Z0-9]+/g,'_').replace(/^_+|_+$/g,''),src=!empty&&tag?`https://sky.coflnet.com/static/icon/${tag}`:'';return <div key={i} className={cls('relative overflow-hidden rounded-[18px] border p-2',empty?'border-white/6 bg-white/4':'border-white/10 bg-white/7')}><div className="mb-2 text-[10px] uppercase tracking-[.18em] text-dim">#{s.slot??i}</div><div className="flex aspect-square items-center justify-center rounded-[14px] bg-black/20">{src?<img src={src} alt={name} className="h-10 w-10 object-contain" onError={e=>e.currentTarget.style.display='none'}/>:<span className="px-2 text-center text-[11px] leading-4 text-dim">{empty?'Empty':name.slice(0,18)}</span>}</div>{!empty&&s.count>1?<div className="absolute bottom-2 right-2 rounded-full bg-black/50 px-2 py-0.5 text-[10px] font-bold text-white">{s.count}</div>:null}<div className="mt-2 text-[11px] leading-4 text-dim">{empty?'No item':name}</div></div>})}</div>}</Card>}
function Table({title,rows,cols,empty,keyFn}){return <Card className="p-5"><div className="mb-4 text-sm font-semibold text-white">{title}</div>{!rows.length?<div className="rounded-[22px] border border-dashed border-white/10 bg-white/3 px-4 py-10 text-center text-sm text-dim">{empty}</div>:<div className="overflow-x-auto"><table className="min-w-full text-left text-sm"><thead><tr className="border-b border-white/10 text-[11px] uppercase tracking-[.2em] text-dim">{cols.map(c=><th key={c.label} className="px-3 py-3 font-medium">{c.label}</th>)}</tr></thead><tbody>{rows.map((r,i)=><tr key={keyFn?keyFn(r,i):i} className="border-b border-white/6 last:border-b-0">{cols.map(c=><td key={c.label} className="px-3 py-3 align-top text-white/90">{c.render?c.render(r):r[c.key]}</td>)}</tr>)}</tbody></table></div>}</Card>}
function Overlay({show,password,setPassword,error,onLogin,profit}){if(!show)return null;const total=(profit.ah_total||0)+(profit.bz_total||0);return <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 px-6 py-8 backdrop-blur-2xl"><div className="grid w-full max-w-5xl gap-6 lg:grid-cols-[.9fr_1.1fr]"><Card className="p-8"><div className="text-[11px] uppercase tracking-[.22em] text-blue">Secure Access</div><h2 className="mt-3 text-4xl font-black tracking-[-.06em] text-white">TWM Web Console</h2><p className="mt-4 text-sm leading-7 text-dim">Enter your web GUI password to unlock the live panel.</p><input className="mt-6 w-full rounded-2xl border border-white/10 bg-white/8 px-4 py-3 text-white outline-none focus:border-blue" type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&onLogin()} placeholder="Password" autoComplete="current-password"/>{error?<div className="mt-3 text-sm text-red">{error}</div>:null}<div className="mt-5 flex gap-3"><Btn onClick={onLogin}>Unlock</Btn><a className="inline-flex items-center rounded-full border border-white/10 bg-white/5 px-5 py-3 text-sm font-semibold text-white/90" href="https://github.com/froumes/escrow" target="_blank" rel="noreferrer">GitHub</a></div></Card><Card className="p-8"><div className="mb-5"><div className="text-[11px] uppercase tracking-[.24em] text-blue">Public Snapshot</div><h3 className="mt-2 text-2xl font-black tracking-[-.05em] text-white">Profit pulse before login</h3></div><div className="grid gap-4 md:grid-cols-3"><Metric label="AH Profit" value={coins(profit.ah_total||0)} accent="text-green"/><Metric label="BZ Profit" value={coins(profit.bz_total||0)} accent="text-blue"/><Metric label="Total" value={coins(total)} accent="text-pink"/></div><div className="mt-6"><ChartCard title="Combined session curve" sub={`Uptime ${uptime(profit.uptime_seconds||0)}`} points={(profit.ah_points||[]).map((p,i)=>[p[0],p[1]+((profit.bz_points||[])[i]?.[1]||0)])} color="#5aa7ff" fill="rgba(90,167,255,.18)"/></div></Card></div></div>}
function App(){const [needsAuth,setNeedsAuth]=useState(false),[password,setPassword]=useState(''),[loginError,setLoginError]=useState(''),[status,setStatus]=useState({}),[profit,setProfit]=useState({ah_points:[],bz_points:[],ah_total:0,bz_total:0,uptime_seconds:0}),[publicProfit,setPublicProfit]=useState({ah_points:[],bz_points:[],ah_total:0,bz_total:0,uptime_seconds:0}),[inventory,setInventory]=useState({slots:[]}),[gameView,setGameView]=useState({open:false,slots:[]}),[auctions,setAuctions]=useState([]),[bzOrders,setBzOrders]=useState([]),[queue,setQueue]=useState([]),[configText,setConfigText]=useState(''),[configMsg,setConfigMsg]=useState(''),[chatInput,setChatInput]=useState(''),[chat,setChat]=useState([]),[tab,setTab]=useState('overview'),[toast,setToast]=useState('');
const flash=useCallback(msg=>{setToast(msg);clearTimeout(window.__twmToast);window.__twmToast=setTimeout(()=>setToast(''),2800)},[]);
const load=useCallback((url,setter)=>req(url).then(v=>{setter(v);setNeedsAuth(false);setLoginError('')}).catch(e=>{if(e.status===401)setNeedsAuth(true)}),[]);
const refresh=useCallback(()=>{load(API.status,setStatus);load(API.profit,setProfit);load(API.inventory,setInventory);load(API.gameView,setGameView);load(API.auctions,setAuctions);load(API.bazaarOrders,setBzOrders);load(API.queue,setQueue)},[load]);
const loadConfig=useCallback(()=>load(API.config,setConfigText),[load]);
useEffect(()=>{req(API.publicProfit).then(setPublicProfit).catch(()=>{});refresh();loadConfig()},[refresh,loadConfig]);
useEffect(()=>{const ws=new WebSocket(API.chatWs());ws.onmessage=e=>setChat(p=>[...p.slice(-249),e.data]);return()=>ws.close()},[]);
useEffect(()=>{if(needsAuth)return;const id=setInterval(refresh,5000),id2=setInterval(()=>req(API.publicProfit).then(setPublicProfit).catch(()=>{}),15000);return()=>{clearInterval(id);clearInterval(id2)}},[needsAuth,refresh]);
const post=useCallback((url,body,msg)=>req(url,{method:'POST',headers:body?{'Content-Type':'application/json'}:undefined,body:body?JSON.stringify(body):undefined}).then(()=>{msg&&flash(msg);refresh()}).catch(e=>{if(e.status===401)setNeedsAuth(true);else flash(e.message||'Request failed')}),[flash,refresh]);
const login=useCallback(()=>req(API.login,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})}).then(()=>{setNeedsAuth(false);setLoginError('');flash('Panel unlocked');refresh();loadConfig()}).catch(()=>setLoginError('Invalid password')),[password,flash,refresh,loadConfig]);
const saveConfig=useCallback(()=>req(API.config,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({config_toml:configText})}).then(()=>{setConfigMsg('Config saved');flash('Config saved');refresh()}).catch(e=>setConfigMsg(e.message||'Config save failed')),[configText,flash,refresh]);
const sendChat=useCallback(()=>{if(!chatInput.trim())return;post(API.chatSend,{message:chatInput},'Chat sent');setChatInput('')},[chatInput,post]);
const total=(profit.ah_total||0)+(profit.bz_total||0),perHour=profit.uptime_seconds?total/(profit.uptime_seconds/3600):0;
const auctionCols=useMemo(()=>[{label:'Item',render:r=><div><div className="font-medium text-white">{r.item_name}</div><div className="text-xs text-dim">{r.bin?'BIN auction':'Auction'}</div></div>},{label:'Start',render:r=>`${coins(r.starting_bid)} coins`},{label:'Highest',render:r=>`${coins(r.highest_bid)} coins`},{label:'Ends In',render:r=>uptime(Math.max(0,r.time_remaining_seconds||0))},{label:'Actions',render:r=><Btn className="px-4 py-2 text-xs" v="secondary" onClick={()=>post(API.cancelAuction,{item_name:r.item_name,starting_bid:r.starting_bid},'Auction cancel queued')}>Cancel</Btn>}],[post]);
const bzCols=useMemo(()=>[{label:'Item',key:'item_name'},{label:'Type',render:r=>r.is_buy_order?'Buy':'Sell'},{label:'Amount',render:r=>String(r.amount??'-')},{label:'Price',render:r=>`${coins(r.price_per_unit)} coins`},{label:'Actions',render:r=><Btn className="px-4 py-2 text-xs" v="secondary" onClick={()=>post(API.cancelBz,{item_name:r.item_name,is_buy_order:r.is_buy_order},'Bazaar cancel queued')}>Cancel</Btn>}],[post]);
const queueCols=useMemo(()=>[{label:'Priority',key:'priority'},{label:'Command',render:r=><code className="text-xs text-blue">{JSON.stringify(r.command_type)}</code>}],[]);
const tabs=[['overview','Overview'],['profit','Profit'],['inventory','Inventory'],['market','Market'],['queue','Queue'],['config','Config'],['chat','Chat']];
return <div className="relative min-h-screen overflow-hidden px-4 py-4 text-white md:px-8 md:py-8"><div className="pointer-events-none absolute inset-0 overflow-hidden"><div className="absolute left-1/2 top-0 h-[34rem] w-[34rem] -translate-x-1/2 rounded-full bg-pink/14 blur-[140px]"></div><div className="absolute right-[-6rem] top-1/3 h-[26rem] w-[26rem] rounded-full bg-blue/16 blur-[130px]"></div></div><div className="relative z-10 mx-auto max-w-[1600px]"><div className="mb-6 flex flex-col gap-4 rounded-[30px] border border-white/10 bg-white/5 px-6 py-5 backdrop-blur-xl md:flex-row md:items-center md:justify-between"><div><div className="text-[11px] uppercase tracking-[.24em] text-blue">Built-In Web GUI</div><div className="mt-2 text-3xl font-black tracking-[-.06em] text-white">TWM Local Control</div></div><div className="flex flex-wrap gap-3">{tabs.map(([k,l])=><button key={k} onClick={()=>setTab(k)} className={cls('rounded-full px-4 py-2 text-sm font-semibold transition',tab===k?'bg-gradient-to-r from-pink to-blue text-white shadow-glow':'border border-white/10 bg-white/5 text-dim hover:text-white')}>{l}</button>)}</div></div><Card className="p-6 md:p-7"><div className="grid gap-8 lg:grid-cols-[1.1fr_.9fr]"><div><div className="inline-flex rounded-full border border-white/10 bg-white/5 px-4 py-2 text-[11px] uppercase tracking-[.24em] text-blue">Live Control Surface</div><h1 className="mt-5 text-4xl font-black tracking-[-.07em] text-white sm:text-5xl">TWM command deck for flips, purse flow, and queue control.</h1><p className="mt-4 max-w-2xl text-sm leading-7 text-dim">A React-based rebuild of the local web GUI on the same bot endpoints. Profit charts now stay continuous across restarts because the tracker is disk-backed.</p><div className="mt-6 flex flex-wrap gap-3"><Btn v="warn" onClick={()=>post(API.pause,null,'Macro paused')}>Pause Macro</Btn><Btn v="success" onClick={()=>post(API.resume,null,'Macro resumed')}>Resume Macro</Btn><Btn v="secondary" onClick={()=>post(API.claimPurchases,null,'Claim purchases queued')}>Claim Purchases</Btn><Btn v="secondary" onClick={()=>post(API.collectBz,null,'Collect BZ queued')}>Collect BZ</Btn><Btn v="secondary" onClick={()=>post(API.claimBz,null,'Claim BZ queued')}>Claim BZ</Btn><Btn v="danger" onClick={()=>post(API.cancelAllBz,null,'Cancel All BZ queued')}>Cancel All BZ</Btn></div></div><div className="grid gap-4 sm:grid-cols-2"><Metric label="State" value={status.state||'-'}/><Metric label="Queue Depth" value={String(status.queue_depth??'-')}/><Metric label="Purse" value={status.purse!=null?`${coins(status.purse)} coins`:'-'} accent="text-blue"/><Metric label="Uptime" value={uptime(status.uptime_seconds)} accent="text-pink"/><Metric label="Account" value={status.current_account||'-'}/><Metric label="Macro" value={status.macro_paused?'Paused':'Running'} accent={status.macro_paused?'text-gold':'text-green'}/></div></div></Card>{tab==='overview'?<div className="mt-6 grid gap-6 xl:grid-cols-[.8fr_1.2fr]"><Card className="p-6"><div className="mb-5"><div className="text-[11px] uppercase tracking-[.24em] text-blue">Runtime Controls</div><h2 className="mt-2 text-2xl font-black tracking-[-.05em] text-white">Live toggles and accounts</h2></div><div className="space-y-3"><Btn className="w-full" v={status.enable_ah_flips?'primary':'secondary'} onClick={()=>post(API.toggleAh,{enabled:!status.enable_ah_flips},`AH flips ${!status.enable_ah_flips?'enabled':'disabled'}`)}>Auction Flips: {status.enable_ah_flips?'On':'Off'}</Btn><Btn className="w-full" v={status.enable_bazaar_flips?'primary':'secondary'} onClick={()=>post(API.toggleBazaar,{enabled:!status.enable_bazaar_flips},`Bazaar flips ${!status.enable_bazaar_flips?'enabled':'disabled'}`)}>Bazaar Flips: {status.enable_bazaar_flips?'On':'Off'}</Btn><Btn className="w-full" v={status.anonymize_webhook_name?'primary':'secondary'} onClick={()=>post(API.toggleAnon,{enabled:!status.anonymize_webhook_name},`Anonymize ${!status.anonymize_webhook_name?'enabled':'disabled'}`)}>Anonymize: {status.anonymize_webhook_name?'On':'Off'}</Btn></div><div className="mt-6 grid gap-3 sm:grid-cols-2">{(status.accounts||[]).map((a,i)=><button key={`${a}-${i}`} onClick={()=>post(API.switchAccount,{index:i},`Switching to ${a}`)} className={cls('rounded-[20px] border px-4 py-3 text-left transition',status.current_account_index===i?'border-pink bg-pink/10 text-white':'border-white/10 bg-white/5 text-dim hover:text-white')}><div className="text-xs uppercase tracking-[.18em] text-blue">Account {i+1}</div><div className="mt-2 text-sm font-semibold">{a}</div></button>)}</div></Card><div className="grid gap-6"><Card className="p-6"><div className="mb-5"><div className="text-[11px] uppercase tracking-[.24em] text-blue">Session Snapshot</div><h2 className="mt-2 text-2xl font-black tracking-[-.05em] text-white">Profit at a glance</h2></div><div className="grid gap-4 md:grid-cols-2 xl:grid-cols-4"><Metric label="AH Profit" value={coins(profit.ah_total)} accent="text-green"/><Metric label="BZ Profit" value={coins(profit.bz_total)} accent="text-blue"/><Metric label="Total" value={coins(total)} accent="text-pink"/><Metric label="Per Hour" value={`${coins(perHour)}/hr`} accent="text-gold"/></div></Card><Grid title={gameView.open?`Open Window: ${gameView.title||'Unknown'}`:'Live Window View'} slots={gameView.slots||[]} label={gameView.open?`Window ${gameView.windowId||'-'}`:'Game view'}/></div></div>:null}{tab==='profit'?<div className="mt-6 grid gap-6 xl:grid-cols-3"><ChartCard title="Auction house profit" sub={`Total ${coins(profit.ah_total)} - persisted across restarts`} points={profit.ah_points||[]} color="#39d98a" fill="rgba(57,217,138,.18)"/><ChartCard title="Bazaar profit" sub={`Total ${coins(profit.bz_total)} - persisted across restarts`} points={profit.bz_points||[]} color="#5aa7ff" fill="rgba(90,167,255,.18)"/><ChartCard title="Combined curve" sub={`Uptime ${uptime(profit.uptime_seconds)} - ${coins(perHour)}/hr`} points={(profit.ah_points||[]).map((p,i)=>[p[0],p[1]+((profit.bz_points||[])[i]?.[1]||0)])} color="#ff4d8d" fill="rgba(255,77,141,.16)"/></div>:null}{tab==='inventory'?<div className="mt-6 grid gap-6 xl:grid-cols-2"><Grid title="Inventory" slots={inventory.slots||[]} label="Player inventory"/><Grid title="Game View" slots={gameView.slots||[]} label={gameView.open?(gameView.title||'Window'):'No active window'}/></div>:null}{tab==='market'?<div className="mt-6 grid gap-6 xl:grid-cols-2"><Table title="Active Auctions" rows={auctions||[]} cols={auctionCols} empty="No active auctions found." keyFn={r=>r.uuid||r.item_name}/><Table title="Bazaar Orders" rows={bzOrders||[]} cols={bzCols} empty="No active bazaar orders found." keyFn={(r,i)=>`${r.item_name}-${r.is_buy_order}-${i}`}/></div>:null}{tab==='queue'?<div className="mt-6 grid gap-6 xl:grid-cols-[.8fr_1.2fr]"><Card className="p-6"><div className="mb-5"><div className="text-[11px] uppercase tracking-[.24em] text-blue">Bot Condition</div><h2 className="mt-2 text-2xl font-black tracking-[-.05em] text-white">Queue and limits</h2></div><div className="grid gap-4 sm:grid-cols-2"><Metric label="Bazaar Limit" value={status.bazaar_at_limit?'Reached':'Clear'} accent={status.bazaar_at_limit?'text-gold':'text-green'}/><Metric label="Auction Limit" value={status.auction_at_limit?'Reached':'Clear'} accent={status.auction_at_limit?'text-gold':'text-green'}/><Metric label="Inventory" value={status.inventory_full?'Full':'Has Space'} accent={status.inventory_full?'text-red':'text-green'}/><Metric label="Current State" value={status.state||'-'}/></div></Card><Table title="Command Queue" rows={queue||[]} cols={queueCols} empty="Command queue is empty."/></div>:null}{tab==='config'?<Card className="mt-6 p-6"><div className="mb-5 flex flex-wrap items-end justify-between gap-4"><div><div className="text-[11px] uppercase tracking-[.24em] text-blue">Config File</div><h2 className="mt-2 text-2xl font-black tracking-[-.05em] text-white">Raw config editor</h2></div><div className="flex gap-3"><Btn onClick={saveConfig}>Save Config</Btn><Btn v="secondary" onClick={loadConfig}>Reload</Btn></div></div>{configMsg?<div className="mb-4 rounded-2xl border border-white/10 bg-white/6 px-4 py-3 text-sm text-white">{configMsg}</div>:null}<textarea className="min-h-[540px] w-full rounded-[24px] border border-white/10 bg-black/25 p-5 font-mono text-sm leading-7 text-slate-100 outline-none focus:border-blue" value={configText} onChange={e=>setConfigText(e.target.value)}></textarea></Card>:null}{tab==='chat'?<div className="mt-6 grid gap-6 xl:grid-cols-[1.15fr_.85fr]"><Card className="p-6"><div className="mb-5"><div className="text-[11px] uppercase tracking-[.24em] text-blue">Live Console</div><h2 className="mt-2 text-2xl font-black tracking-[-.05em] text-white">Chat stream</h2></div><div className="h-[520px] overflow-y-auto rounded-[24px] border border-white/8 bg-black/20 p-4 font-mono text-sm leading-7 text-slate-200">{!chat.length?<div className="text-dim">Waiting for chat traffic...</div>:null}{chat.map((m,i)=><div key={i} className="border-b border-white/5 py-2 last:border-b-0">{stripMc(m)}</div>)}</div></Card><Card className="p-6"><div className="mb-5"><div className="text-[11px] uppercase tracking-[.24em] text-blue">Send Commands</div><h2 className="mt-2 text-2xl font-black tracking-[-.05em] text-white">Chat input</h2><p className="mt-2 text-sm leading-7 text-dim">Use this for in-game chat, /cofl commands, and /baf compatibility commands.</p></div><textarea className="min-h-[180px] w-full rounded-[22px] border border-white/10 bg-black/25 p-4 text-sm text-white outline-none focus:border-blue" value={chatInput} onChange={e=>setChatInput(e.target.value)} placeholder="Type a message or command..."></textarea><div className="mt-4 flex flex-wrap gap-3"><Btn onClick={sendChat}>Send Chat</Btn><Btn v="secondary" onClick={()=>setChatInput('/cofl ping')}>Insert /cofl ping</Btn><Btn v="secondary" onClick={()=>setChatInput('/baf')}>Insert /baf</Btn></div></Card></div>:null}</div></div>{toast?<div className="fixed bottom-6 right-6 z-40 rounded-full border border-white/10 bg-black/55 px-5 py-3 text-sm font-semibold text-white shadow-glow backdrop-blur-xl">{toast}</div>:null}<Overlay show={needsAuth} password={password} setPassword={setPassword} error={loginError} onLogin={login} profit={publicProfit}/></div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
