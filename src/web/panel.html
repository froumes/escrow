function LoginOverlay({ show, password, setPassword, error, onLogin, publicProfit }) {
    if (!show) return null;

    const sessionCombined = mergeProfitSeries(publicProfit.session_ah_points, publicProfit.session_bz_points);
    const sessionTotal = publicProfit.session_total || ((publicProfit.session_ah_total || 0) + (publicProfit.session_bz_total || 0));
    const allTimeTotal = publicProfit.all_time_total || ((publicProfit.all_time_ah_total || 0) + (publicProfit.all_time_bz_total || 0));
    const sessionPerHour = publicProfit.session_per_hour || (
        publicProfit.session_uptime_seconds ? sessionTotal / (publicProfit.session_uptime_seconds / 3600) : 0
    );

    return html`
        <div className="overlay">
            <div className="overlayGrid">
                <${Panel}>
                    <div className="loginPanel">
                        <span className="eyebrow">Secure Access</span>
                        <h2>Unlock the local TWM panel.</h2>
                        <p className="subtle">
                            The local UI is protected by the web GUI password when one is configured. Authenticate once and the session cookie keeps the panel usable.
                        </p>

                        <input
                            className="loginField"
                            type="password"
                            value=${password}
                            placeholder="Web GUI password"
                            autoComplete="current-password"
                            onInput=${(event) => setPassword(event.target.value)}
                            onKeyDown=${(event) => {
                                if (event.key === "Enter") onLogin();
                            }}
                        />

                        ${error ? html`<div className="loginError">${error}</div>` : null}

                        <div className="loginActions">
                            <${Button} kind="primary" onClick=${onLogin}>Unlock Panel</${Button}>
                            <a className="button secondary" href="https://github.com/froumes/escrow" target="_blank" rel="noreferrer">Repository</a>
                        </div>

                        <div className="miniList">
                            <div className="miniRow"><strong>What stays public</strong><span>Only anonymized profit summary and OG stats.</span></div>
                            <div className="miniRow"><strong>What stays locked</strong><span>Runtime controls, config, inventory, market state, and chat.</span></div>
                        </div>
                    </div>
                </${Panel}>

                <${Panel}>
                    <div className="cardBody">
                        <div className="sectionTitle">
                            <div>
                                <span className="eyebrow">Public Snapshot</span>
                                <h2 className="panelTitle">Session pace and all-time profit</h2>
                                <p>The public view keeps session performance separate from lifetime totals so the pace number stays believable.</p>
                            </div>
                        </div>

                        <div className="statGrid">
                            <${StatCard} label="Session AH" value=${coins(publicProfit.session_ah_total || 0)} tone="tone-green" />
                            <${StatCard} label="Session BZ" value=${coins(publicProfit.session_bz_total || 0)} tone="tone-blue" />
                            <${StatCard} label="Session Total" value=${coins(sessionTotal)} tone="tone-gold" sub=${`${coins(sessionPerHour)}/hr`} />
                            <${StatCard} label="All-Time Total" value=${coins(allTimeTotal)} tone="tone-gold" sub="Persists across restarts" />
                        </div>

                        <div style=${{ marginTop: "18px" }}>
                            <${ChartCard}
                                title="Combined session curve"
                                subtitle=${`Session uptime ${uptime(publicProfit.session_uptime_seconds || 0)}`}
                                points=${sessionCombined}
                                color="#81b7ff"
                                fill="rgba(129,183,255,.16)"
                                height=${280}
                            />
                        </div>
                    </div>
                </${Panel}>
            </div>
        </div>
    `;
}

function App() {
    const [activeTab, setActiveTab] = useState("dashboard");
    const [needsAuth, setNeedsAuth] = useState(false);
    const [password, setPassword] = useState("");
    const [loginError, setLoginError] = useState("");
    const [toast, setToast] = useState("");
    const [lastRefresh, setLastRefresh] = useState(null);

    const [status, setStatus] = useState({});
    const [profit, setProfit] = useState({
        all_time_ah_points: [],
        all_time_bz_points: [],
        all_time_ah_total: 0,
        all_time_bz_total: 0,
        session_ah_points: [],
        session_bz_points: [],
        session_ah_total: 0,
        session_bz_total: 0,
        session_uptime_seconds: 0
    });
    const [publicProfit, setPublicProfit] = useState({
        all_time_ah_total: 0,
        all_time_bz_total: 0,
        all_time_total: 0,
        session_ah_total: 0,
        session_bz_total: 0,
        session_total: 0,
        session_per_hour: 0,
        session_uptime_seconds: 0,
        session_ah_points: [],
        session_bz_points: []
    });
    const [inventory, setInventory] = useState({ slots: [] });
    const [gameView, setGameView] = useState({ open: false, slots: [] });
    const [auctions, setAuctions] = useState([]);
    const [bzOrders, setBzOrders] = useState([]);
    const [queue, setQueue] = useState([]);
    const [configText, setConfigText] = useState("");
    const [savedConfigText, setSavedConfigText] = useState("");
    const [configMsg, setConfigMsg] = useState("");
    const [chatInput, setChatInput] = useState("");
    const [chat, setChat] = useState([]);
    const [chatConnected, setChatConnected] = useState(false);

    const chatBoxRef = useRef(null);
    const toastTimerRef = useRef(null);

    const flash = useCallback((message) => {
        setToast(message);
        if (toastTimerRef.current) window.clearTimeout(toastTimerRef.current);
        toastTimerRef.current = window.setTimeout(() => setToast(""), 2600);
    }, []);

    const handleUnauthorized = useCallback(() => {
        setNeedsAuth(true);
        setChatConnected(false);
    }, []);

    const loadJson = useCallback(async (url, setter, { silent = true } = {}) => {
        try {
            const value = await req(url);
            setter(value);
            setNeedsAuth(false);
            setLoginError("");
            return value;
        } catch (error) {
            if (error.status === 401) {
                handleUnauthorized();
            } else if (!silent) {
                flash(error.message || "Request failed");
            }
            return null;
        }
    }, [flash, handleUnauthorized]);

    const loadConfig = useCallback(async ({ silent = true } = {}) => {
        try {
            const text = await req(API.config);
            setConfigText(text);
            setSavedConfigText(text);
            setConfigMsg("");
            setNeedsAuth(false);
            setLoginError("");
            return text;
        } catch (error) {
            if (error.status === 401) {
                handleUnauthorized();
            } else if (!silent) {
                setConfigMsg(error.message || "Failed to load config");
                flash(error.message || "Failed to load config");
            }
            return null;
        }
    }, [flash, handleUnauthorized]);

    const refreshCore = useCallback(async () => {
        const results = await Promise.all([
            loadJson(API.status, setStatus),
            loadJson(API.profit, setProfit),
            loadJson(API.queue, setQueue)
        ]);
        if (results.some(Boolean)) {
            setLastRefresh(Date.now());
        }
    }, [loadJson]);

    const refreshSurface = useCallback(async () => {
        await Promise.all([
            loadJson(API.inventory, setInventory),
            loadJson(API.gameView, setGameView)
        ]);
    }, [loadJson]);

    const refreshMarket = useCallback(async () => {
        await Promise.all([
            loadJson(API.auctions, setAuctions),
            loadJson(API.bazaarOrders, setBzOrders)
        ]);
    }, [loadJson]);

    const refreshEverything = useCallback(async () => {
        await Promise.all([refreshCore(), refreshSurface(), refreshMarket()]);
    }, [refreshCore, refreshSurface, refreshMarket]);

    const post = useCallback(async (url, body, successMessage) => {
        const options = { method: "POST" };
        if (body != null) {
            options.headers = { "Content-Type": "application/json" };
            options.body = JSON.stringify(body);
        }

        try {
            await req(url, options);
            if (successMessage) flash(successMessage);
            await refreshEverything();
        } catch (error) {
            if (error.status === 401) {
                handleUnauthorized();
            } else {
                flash(error.message || "Request failed");
            }
        }
    }, [flash, handleUnauthorized, refreshEverything]);

    const login = useCallback(async () => {
        try {
            await req(API.login, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password })
            });
            setNeedsAuth(false);
            setLoginError("");
            flash("Panel unlocked");
            await refreshEverything();
            await loadConfig();
        } catch (error) {
            setLoginError("Invalid password");
        }
    }, [password, flash, refreshEverything, loadConfig]);

    const saveConfig = useCallback(async () => {
        try {
            await req(API.config, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ config_toml: configText })
            });
            setSavedConfigText(configText);
            setConfigMsg("Config saved");
            flash("Config saved");
            await refreshCore();
        } catch (error) {
            if (error.status === 401) {
                handleUnauthorized();
            } else {
                setConfigMsg(error.message || "Config save failed");
                flash(error.message || "Config save failed");
            }
        }
    }, [configText, flash, handleUnauthorized, refreshCore]);

    const sendChat = useCallback(async () => {
        if (!chatInput.trim()) return;
        try {
            await req(API.chatSend, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: chatInput.trim() })
            });
            setChatInput("");
            flash("Chat sent");
        } catch (error) {
            if (error.status === 401) {
                handleUnauthorized();
            } else {
                flash(error.message || "Failed to send chat");
            }
        }
    }, [chatInput, flash, handleUnauthorized]);

    useEffect(() => {
        req(API.publicProfit)
            .then(setPublicProfit)
            .catch(() => {});
        refreshEverything();
        loadConfig();
    }, [refreshEverything, loadConfig]);

    useEffect(() => {
        const interval = window.setInterval(() => {
            req(API.publicProfit).then(setPublicProfit).catch(() => {});
        }, 15000);
        return () => window.clearInterval(interval);
    }, []);

    useEffect(() => {
        if (needsAuth) return undefined;

        const tick = () => {
            refreshCore();
            if (activeTab === "dashboard" || activeTab === "inventory") {
                refreshSurface();
            }
            if (activeTab === "dashboard" || activeTab === "market") {
                refreshMarket();
            }
        };

        tick();
        const interval = window.setInterval(tick, 5000);
        return () => window.clearInterval(interval);
    }, [needsAuth, activeTab, refreshCore, refreshSurface, refreshMarket]);

    useEffect(() => {
        if (activeTab === "config" && !configText) {
            loadConfig();
        }
    }, [activeTab, configText, loadConfig]);

    useEffect(() => {
        if (activeTab !== "config") return undefined;
        const onKeyDown = (event) => {
            if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "s") {
                event.preventDefault();
                saveConfig();
            }
        };
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
    }, [activeTab, saveConfig]);

    useEffect(() => {
        if (needsAuth) return undefined;

        let socket;
        let closed = false;
        let reconnectTimer = null;

        const connect = () => {
            socket = new WebSocket(API.chatWs());
            socket.onopen = () => setChatConnected(true);
            socket.onmessage = (event) => {
                setChat((previous) => [...previous.slice(-299), event.data]);
            };
            socket.onerror = () => {
                setChatConnected(false);
            };
            socket.onclose = () => {
                setChatConnected(false);
                if (!closed) {
                    reconnectTimer = window.setTimeout(connect, 3000);
                }
            };
        };

        connect();

        return () => {
            closed = true;
            setChatConnected(false);
            if (reconnectTimer) window.clearTimeout(reconnectTimer);
            if (socket && socket.readyState <= 1) {
                socket.close();
            }
        };
    }, [needsAuth]);

    useEffect(() => {
        const box = chatBoxRef.current;
        if (!box) return;
        const nearBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 72;
        if (nearBottom) {
            box.scrollTop = box.scrollHeight;
        }
    }, [chat]);

    const sessionTotalProfit = (profit.session_ah_total || 0) + (profit.session_bz_total || 0);
    const allTimeTotalProfit = (profit.all_time_ah_total || 0) + (profit.all_time_bz_total || 0);
    const sessionCombinedPoints = useMemo(
        () => mergeProfitSeries(profit.session_ah_points, profit.session_bz_points),
        [profit.session_ah_points, profit.session_bz_points]
    );
    const allTimeCombinedPoints = useMemo(
        () => mergeProfitSeries(profit.all_time_ah_points, profit.all_time_bz_points),
        [profit.all_time_ah_points, profit.all_time_bz_points]
    );
    const sessionPerHour = profit.session_uptime_seconds ? sessionTotalProfit / (profit.session_uptime_seconds / 3600) : 0;
    const dirtyConfig = configText !== savedConfigText;
    const selectedWindowLabel = gameView.open ? `${gameView.title || "Unknown window"} · ${gameView.slotCount || (gameView.slots || []).length} slots` : "No active window";
    const activeAuctionCount = Array.isArray(auctions) ? auctions.length : 0;
    const totalAuctionValue = (auctions || []).reduce((sum, auction) => {
        const starting = Number(auction.starting_bid || 0);
        const highest = Number(auction.highest_bid || 0);
        return sum + Math.max(starting, highest);
    }, 0);
    const activeBzCount = Array.isArray(bzOrders) ? bzOrders.length : 0;
    const buyOrders = (bzOrders || []).filter((order) => order.is_buy_order).length;
    const sellOrders = (bzOrders || []).filter((order) => !order.is_buy_order).length;
    const filledOrders = (bzOrders || []).filter((order) => order.status === "filled").length;
    const soonestAuction = (auctions || []).reduce((current, auction) => {
        const remaining = Number(auction.time_remaining_seconds || 0);
        if (!current || remaining < current) return remaining;
        return current;
    }, null);

    const auctionColumns = useMemo(() => ([
        {
            label: "Item",
            render: (row) => html`
                <${TooltipAnchor} tooltip=${getTooltipData(row)} className="inline">
                <div>
                    <div className="rowTitle">${row.item_name}</div>
                    <div className="rowSub">${row.bin ? "BIN listing" : "Auction listing"}</div>
                </div>
                </${TooltipAnchor}>
            `
        },
        {
            label: "Starting",
            render: (row) => formatCoinsLong(row.starting_bid)
        },
        {
            label: "Current Price",
            render: (row) => formatCoinsLong(Math.max(Number(row.starting_bid || 0), Number(row.highest_bid || 0)))
        },
        {
            label: "Ends In",
            render: (row) => uptime(Math.max(0, row.time_remaining_seconds || 0))
        }
    ]), []);

    const bzColumns = useMemo(() => ([
        {
            label: "Item",
            render: (row) => html`
                <div>
                    <div className="rowTitle">${row.item_name}</div>
                    <div className="rowSub">${row.status || "open"}</div>
                </div>
            `
        },
        {
            label: "Side",
            render: (row) => row.is_buy_order ? "Buy" : "Sell"
        },
        {
            label: "Amount",
            render: (row) => Number(row.amount || 0).toLocaleString()
        },
        {
            label: "Price",
            render: (row) => formatCoinsLong(row.price_per_unit)
        }
    ]), []);

    return html`
        <main className="app">
            <${Panel}>
                <div className="topbar">
                    <div className="brandWrap">
                        <div className="brandMark">TWM</div>
                        <div className="brandText">
                            <span className="eyebrow">Local Runtime Control</span>
                            <h1>Operational panel for live flips, queue state, market cleanup, and config.</h1>
                            <div className="brandMeta">
                                <${StatusBadge} label="Macro" value=${status.macro_paused ? "Paused" : "Running"} tone=${status.macro_paused ? "tone-gold" : "tone-green"} />
                                    <${StatusBadge} label="State" value=${humanizeIdentifier(status.state)} tone="tone-blue" />
                                <${StatusBadge} label="Account" value=${status.current_account || "-"} />
                            </div>
                        </div>
                    </div>

                    <div className="toolbar">
                        <span className="pill">Updated ${lastRefresh ? new Date(lastRefresh).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }) : "pending"}</span>
                        <${Button} kind="secondary" size="small" onClick=${refreshEverything}>Refresh Now</${Button}>
                        <${Button} kind="ghost" size="small" onClick=${() => { window.location.href = API.logsLatest; }}>Download Latest Log</${Button}>
                    </div>
                </div>

                <div className="tabbar">
                    ${TAB_DEFS.map(([key, label]) => html`
                        <button key=${key} type="button" className=${cls("tab", activeTab === key && "active")} onClick=${() => setActiveTab(key)}>
                            ${label}
                        </button>
                    `)}
                </div>
            </${Panel}>

            <div className="layout">
                ${activeTab === "dashboard" ? html`
                    <${Panel}>
                        <div className="hero">
                            <div className="heroCopy">
                                <span className="eyebrow">Runtime Summary</span>
                                <h2>Keep the bot controllable without hunting across seven cramped tabs.</h2>
                                <p className="subtle">
                                    The panel is now organized around actual operating tasks: pause or resume fast, inspect the live state, manage market cleanup, switch accounts, and reach the data that matters without digging.
                                </p>
                                <div className="heroActions">
                                    <${Button} kind="warn" onClick=${() => post(API.pause, null, "Macro paused")}>Pause Macro</${Button}>
                                    <${Button} kind="success" onClick=${() => post(API.resume, null, "Macro resumed")}>Resume Macro</${Button}>
                                    <${Button} kind="secondary" onClick=${() => post(API.claimPurchases, null, "Claim purchases queued")}>Claim Purchases</${Button}>
                                    <${Button} kind="secondary" onClick=${() => post(API.collectBz, null, "Collect bazaar orders queued")}>Collect BZ</${Button}>
                                    <${Button} kind="secondary" onClick=${() => post(API.claimBz, null, "Claim bazaar orders queued")}>Claim Filled BZ</${Button}>
                                    <${Button} kind="danger" onClick=${() => post(API.cancelAllBz, null, "Cancel all bazaar orders queued")}>Cancel All BZ</${Button}>
                                </div>
                                <div className="heroMeta">
                                    <span className=${cls("pill", status.enable_ah_flips ? "tone-green" : "tone-red")}>AH ${status.enable_ah_flips ? "enabled" : "disabled"}</span>
                                    <span className=${cls("pill", status.enable_bazaar_flips ? "tone-green" : "tone-red")}>BZ ${status.enable_bazaar_flips ? "enabled" : "disabled"}</span>
                                    <span className=${cls("pill", status.anonymize_webhook_name ? "tone-blue" : "")}>Anonymize ${status.anonymize_webhook_name ? "on" : "off"}</span>
                                    <span className="pill">Queue ${status.queue_depth ?? 0}</span>
                                </div>
                            </div>

                            <div className="heroAside">
                                <div className="statGrid">
                                    <${StatCard} label="Purse" value=${status.purse != null ? coins(status.purse) : "-"} sub=${status.purse != null ? formatCoinsLong(status.purse) : "No purse cached"} tone="tone-blue" />
                                    <${StatCard} label="In AH" value=${coins(totalAuctionValue)} sub=${activeAuctionCount ? `${activeAuctionCount} active listings` : "No active auctions"} tone="tone-gold" />
                                    <${StatCard} label="Runtime Uptime" value=${uptime(status.uptime_seconds)} sub="Persists across restarts" tone="tone-gold" />
                                    <${StatCard} label="Session P/H" value=${`${coins(sessionPerHour)}/hr`} sub="Session-only realized pace" tone="tone-green" />
                                    <${StatCard} label="Session AH" value=${coins(profit.session_ah_total)} sub="Auction house this session" tone="tone-green" />
                                    <${StatCard} label="Session BZ" value=${coins(profit.session_bz_total)} sub="Bazaar this session" tone="tone-blue" />
                                    <${StatCard} label="Session Total" value=${coins(sessionTotalProfit)} sub=${`Session uptime ${uptime(profit.session_uptime_seconds)}`} tone="tone-gold" />
                                    <${StatCard} label="All-Time Total" value=${coins(allTimeTotalProfit)} sub=${`${activeAuctionCount} auctions · ${activeBzCount} orders`} tone="tone-gold" />
                                </div>

                                <div className="detailCard">
                                    <span className="eyebrow">Live Window</span>
                                    <h3 className="detailTitle">${gameView.open ? (gameView.title || "Unnamed window") : "No active window"}</h3>
                                    <div className="detailMeta">
                                        <span className="tag">${gameView.open ? "Open" : "Closed"}</span>
                                        <span className="tag">Window ${gameView.windowId ?? "-"}</span>
                                        <span className="tag">${gameView.slotCount || (gameView.slots || []).length} slots</span>
                                    </div>
                                    <p className="subtle">${selectedWindowLabel}</p>
                                </div>
                            </div>
                        </div>
                    </${Panel}>

                    <div className="dashboardGrid">
                        <div className="stack">
                            <${Panel}>
                                <div className="cardBody">
                                    <div className="sectionTitle">
                                        <div>
                                            <span className="eyebrow">Toggles</span>
                                            <h2 className="panelTitle">Runtime switches and account routing</h2>
                                            <p>Frequently used controls stay grouped instead of being scattered across sections.</p>
                                        </div>
                                    </div>

                                    <div className="threeCol" style=${{ marginTop: "18px" }}>
                                        <div className="toggleCard">
                                            <div className="toggleHead">
                                                <h3>Auction House flips</h3>
                                                <${StatusBadge} value=${status.enable_ah_flips ? "On" : "Off"} tone=${status.enable_ah_flips ? "tone-green" : "tone-red"} />
                                            </div>
                                            <p>Enable or disable AH flips and persist the toggle to config.</p>
                                            <${Button}
                                                kind=${status.enable_ah_flips ? "secondary" : "primary"}
                                                onClick=${() => post(API.toggleAh, { enabled: !status.enable_ah_flips }, `AH flips ${!status.enable_ah_flips ? "enabled" : "disabled"}`)}
                                            >
                                                Turn ${status.enable_ah_flips ? "Off" : "On"}
                                            </${Button}>
                                        </div>

                                        <div className="toggleCard">
                                            <div className="toggleHead">
                                                <h3>Bazaar flips</h3>
                                                <${StatusBadge} value=${status.enable_bazaar_flips ? "On" : "Off"} tone=${status.enable_bazaar_flips ? "tone-green" : "tone-red"} />
                                            </div>
                                            <p>Control Bazaar order automation independently from AH runtime.</p>
                                            <${Button}
                                                kind=${status.enable_bazaar_flips ? "secondary" : "primary"}
                                                onClick=${() => post(API.toggleBazaar, { enabled: !status.enable_bazaar_flips }, `Bazaar flips ${!status.enable_bazaar_flips ? "enabled" : "disabled"}`)}
                                            >
                                                Turn ${status.enable_bazaar_flips ? "Off" : "On"}
                                            </${Button}>
                                        </div>

                                        <div className="toggleCard">
                                            <div className="toggleHead">
                                                <h3>Anonymize panel/webhook name</h3>
                                                <${StatusBadge} value=${status.anonymize_webhook_name ? "On" : "Off"} tone="tone-blue" />
                                            </div>
                                            <p>Hide account names in screenshots and public-facing webhook surfaces for this session.</p>
                                            <${Button}
                                                kind="secondary"
                                                onClick=${() => post(API.toggleAnon, { enabled: !status.anonymize_webhook_name }, `Anonymize ${!status.anonymize_webhook_name ? "enabled" : "disabled"}`)}
                                            >
                                                Toggle Anonymize
                                            </${Button}>
                                        </div>
                                    </div>

                                    <div className="miniList">
                                        <div className="miniRow">
                                            <strong>Current account</strong>
                                            <span>${status.current_account || "-"}</span>
                                        </div>
                                        <div className="miniRow">
                                            <strong>Available accounts</strong>
                                            <span>${(status.accounts || []).length}</span>
                                        </div>
                                    </div>

                                    ${(status.accounts || []).length ? html`
                                        <div className="accountList" style=${{ marginTop: "16px" }}>
                                            ${(status.accounts || []).map((account, index) => html`
                                                <button
                                                    key=${`${account}-${index}`}
                                                    type="button"
                                                    className=${cls("button", index === status.current_account_index ? "primary" : "secondary")}
                                                    onClick=${() => post(API.switchAccount, { index }, `Switching to ${account}`)}
                                                >
                                                    ${index === status.current_account_index ? `Current · ${account}` : `Switch to ${account}`}
                                                </button>
                                            `)}
                                        </div>
                                    ` : null}
                                </div>
                            </${Panel}>

                            <${ChartCard}
                                title="Combined profit pulse"
                                subtitle=${`Session total ${coins(sessionTotalProfit)} · ${coins(sessionPerHour)}/hr · session uptime ${uptime(profit.session_uptime_seconds)}`}
                                points=${sessionCombinedPoints}
                                color="#f2b15c"
                                fill="rgba(242,177,92,.16)"
                            />
                        </div>

                        <div className="stack">
                            <${Panel}>
                                <div className="cardBody">
                                    <div className="sectionTitle">
                                        <div>
                                            <span className="eyebrow">Cleanup</span>
                                            <h2 className="panelTitle">Market maintenance actions</h2>
                                            <p>Frequent maintenance tasks are grouped with their intent instead of sitting in one long button row.</p>
                                        </div>
                                    </div>

                                    <div className="actionGrid">
                                        <div className="actionCard">
                                            <h3>Purchases</h3>
                                            <p>Claim completed AH purchases without leaving the panel.</p>
                                            <${Button} kind="secondary" onClick=${() => post(API.claimPurchases, null, "Claim purchases queued")}>Queue Claim</${Button}>
                                        </div>
                                        <div className="actionCard">
                                            <h3>Collect BZ</h3>
                                            <p>Collect finished Bazaar orders and refresh tracked order state.</p>
                                            <${Button} kind="secondary" onClick=${() => post(API.collectBz, null, "Collect bazaar orders queued")}>Collect Orders</${Button}>
                                        </div>
                                        <div className="actionCard">
                                            <h3>Claim Filled BZ</h3>
                                            <p>Claim filled Bazaar orders directly from the maintenance surface.</p>
                                            <${Button} kind="secondary" onClick=${() => post(API.claimBz, null, "Claim bazaar orders queued")}>Claim Filled</${Button}>
                                        </div>
                                    </div>
                                </div>
                            </${Panel}>

                            <${Panel}>
                                <div className="cardBody">
                                    <div className="sectionTitle">
                                        <div>
                                            <span className="eyebrow">Health</span>
                                            <h2 className="panelTitle">Runtime flags</h2>
                                            <p>These are the blockers you usually need to see before deciding what to click next.</p>
                                        </div>
                                    </div>
                                    <div className="miniList">
                                        <div className="miniRow"><strong>Queue depth</strong><span>${status.queue_depth ?? 0}</span></div>
                                        <div className="miniRow"><strong>Bazaar limit</strong><span>${status.bazaar_at_limit ? "Reached" : "Clear"}</span></div>
                                        <div className="miniRow"><strong>Auction limit</strong><span>${status.auction_at_limit ? "Reached" : "Clear"}</span></div>
                                        <div className="miniRow"><strong>Inventory capacity</strong><span>${status.inventory_full ? "Full" : "Has space"}</span></div>
                                        <div className="miniRow"><strong>Open auctions</strong><span>${activeAuctionCount}${soonestAuction != null ? ` ? next ends in ${uptime(soonestAuction)}` : ""}</span></div>
                                        <div className="miniRow"><strong>Value in AH</strong><span>${formatCoinsLong(totalAuctionValue)}</span></div>
                                        <div className="miniRow"><strong>Bazaar orders</strong><span>${activeBzCount} total ? ${filledOrders} filled</span></div>
                                    </div>
                                </div>
                            </${Panel}>
                        </div>
                    </div>
                ` : null}

                ${activeTab === "analytics" ? html`
                    <div className="layout">
                        <div className="sectionTitle">
                            <div>
                                <span className="eyebrow">Session</span>
                                <h2 className="panelTitle">Current session profit</h2>
                                <p>These curves reset when the bot restarts, so the pace number stays tied to the runtime that generated it.</p>
                            </div>
                        </div>
                        <div className="threeCol">
                            <${ChartCard}
                                title="Session AH profit"
                                subtitle=${`Realized total ${coins(profit.session_ah_total)}`}
                                points=${profit.session_ah_points || []}
                                color="#73d2af"
                                fill="rgba(115,210,175,.16)"
                            />
                            <${ChartCard}
                                title="Session BZ profit"
                                subtitle=${`Realized total ${coins(profit.session_bz_total)}`}
                                points=${profit.session_bz_points || []}
                                color="#81b7ff"
                                fill="rgba(129,183,255,.16)"
                            />
                            <${ChartCard}
                                title="Session combined curve"
                                subtitle=${`Combined total ${coins(sessionTotalProfit)} · ${coins(sessionPerHour)}/hr`}
                                points=${sessionCombinedPoints}
                                color="#f2b15c"
                                fill="rgba(242,177,92,.16)"
                            />
                        </div>

                        <div className="sectionTitle">
                            <div>
                                <span className="eyebrow">All-Time</span>
                                <h2 className="panelTitle">Lifetime realized profit</h2>
                                <p>These totals persist across restarts and stay separate from the session pace calculations.</p>
                            </div>
                        </div>
                        <div className="threeCol">
                            <${ChartCard}
                                title="All-time AH profit"
                                subtitle=${`Realized total ${coins(profit.all_time_ah_total)}`}
                                points=${profit.all_time_ah_points || []}
                                color="#73d2af"
                                fill="rgba(115,210,175,.16)"
                            />
                            <${ChartCard}
                                title="All-time BZ profit"
                                subtitle=${`Realized total ${coins(profit.all_time_bz_total)}`}
                                points=${profit.all_time_bz_points || []}
                                color="#81b7ff"
                                fill="rgba(129,183,255,.16)"
                            />
                            <${ChartCard}
                                title="All-time combined curve"
                                subtitle=${`Combined total ${coins(allTimeTotalProfit)}`}
                                points=${allTimeCombinedPoints}
                                color="#f2b15c"
                                fill="rgba(242,177,92,.16)"
                            />
                        </div>
                    </div>
                ` : null}

                ${activeTab === "inventory" ? html`
                    <div className="layout">
                        <${InventoryPanel}
                            title="Player inventory"
                            subtitle="Cached local inventory with slot inspection, icon lookup, tags, and lore."
                            slots=${inventory.slots || []}
                        />
                        <${InventoryPanel}
                            title=${gameView.open ? (gameView.title || "Active window") : "Game view"}
                            subtitle=${gameView.open ? "Current GUI window contents and slot detail." : "No live GUI window is currently open."}
                            slots=${gameView.slots || []}
                        />
                    </div>
                ` : null}

                ${activeTab === "market" ? html`
                    <div className="layout">
                        <${MarketTableCard}
                            title="Active auctions"
                            subtitle="Listings currently visible to the panel, sourced from local cache or remote fallback."
                            rows=${auctions || []}
                            emptyText="No active auctions found."
                            columns=${auctionColumns}
                            keyFn=${(row, index) => row.uuid || `${row.item_name}-${row.starting_bid}-${index}`}
                            summaryTags=${[
                                `${activeAuctionCount} active`,
                                soonestAuction != null ? `Soonest ${uptime(soonestAuction)}` : "No expiry data"
                            ]}
                            detailRenderer=${(row) => html`
                                <div>
                                    <span className="eyebrow">Auction Detail</span>
                                    <${TooltipAnchor} tooltip=${getTooltipData(row)} className="inline">
                                    <h3 className="detailTitle"><${MinecraftText} text=${row.displayNameColored || row.item_name} /></h3>
                                    </${TooltipAnchor}>
                                    <div className="detailMeta">
                                        <span className="tag">${row.bin ? "BIN" : "Auction"}</span>
                                        <span className="tag">${uptime(Math.max(0, row.time_remaining_seconds || 0))} left</span>
                                        ${row.tag ? html`<span className="tag mono">${row.tag}</span>` : null}
                                    </div>
                                    <div className="miniList">
                                        <div className="miniRow"><strong>Starting bid</strong><span>${formatCoinsLong(row.starting_bid)}</span></div>
                                        <div className="miniRow"><strong>Highest bid</strong><span>${formatCoinsLong(row.highest_bid)}</span></div>
                                        <div className="miniRow"><strong>Ends at</strong><span>${row.end || "-"}</span></div>
                                    </div>
                                    <div style=${{ marginTop: "14px" }}>
                                        <${Button}
                                            kind="danger"
                                            onClick=${() => post(API.cancelAuction, { item_name: row.item_name, starting_bid: row.starting_bid }, "Auction cancel queued")}
                                        >
                                            Queue Cancel Auction
                                        </${Button}>
                                    </div>
                                </div>
                            `}
                        />

                        <${MarketTableCard}
                            title="Bazaar orders"
                            subtitle="Tracked Bazaar orders with side, size, price, and fill state."
                            rows=${bzOrders || []}
                            emptyText="No active bazaar orders found."
                            columns=${bzColumns}
                            keyFn=${(row, index) => `${row.item_name}-${row.is_buy_order}-${row.placed_at || index}-${index}`}
                            summaryTags=${[
                                `${activeBzCount} orders`,
                                `${buyOrders} buy`,
                                `${sellOrders} sell`,
                                `${filledOrders} filled`
                            ]}
                            detailRenderer=${(row) => html`
                                <div>
                                    <span className="eyebrow">Order Detail</span>
                                    <h3 className="detailTitle">${row.item_name}</h3>
                                    <div className="detailMeta">
                                        <span className="tag">${row.is_buy_order ? "Buy order" : "Sell order"}</span>
                                        <span className="tag">${row.status || "open"}</span>
                                        <span className="tag">${formatPlacedAt(row.placed_at)}</span>
                                    </div>
                                    <div className="miniList">
                                        <div className="miniRow"><strong>Amount</strong><span>${Number(row.amount || 0).toLocaleString()}</span></div>
                                        <div className="miniRow"><strong>Price per unit</strong><span>${formatCoinsLong(row.price_per_unit)}</span></div>
                                        <div className="miniRow"><strong>Placed</strong><span>${formatPlacedAt(row.placed_at)}</span></div>
                                    </div>
                                    <div style=${{ marginTop: "14px" }}>
                                        <${Button}
                                            kind="danger"
                                            onClick=${() => post(API.cancelBz, { item_name: row.item_name, is_buy_order: row.is_buy_order }, "Bazaar cancel queued")}
                                        >
                                            Queue Cancel Order
                                        </${Button}>
                                    </div>
                                </div>
                            `}
                        />
                    </div>
                ` : null}

                ${activeTab === "queue" ? html`
                    <${QueueCard} status=${status} queue=${queue} />
                ` : null}

                ${activeTab === "config" ? html`
                    <${Panel}>
                        <div className="cardBody">
                            <div className="sectionTitle">
                                <div>
                                    <span className="eyebrow">Config</span>
                                    <h2 className="panelTitle">Raw TOML editor with safer affordances</h2>
                                    <p>Save, reload, and download logs from the same place. Ctrl/Cmd + S also saves while this tab is open.</p>
                                </div>
                                <div className="configTools">
                                    <span className=${cls("pill", dirtyConfig ? "tone-gold" : "tone-green")}>
                                        ${dirtyConfig ? "Unsaved changes" : "Saved"}
                                    </span>
                                    <${Button} kind="primary" onClick=${saveConfig}>Save Config</${Button}>
                                    <${Button} kind="secondary" onClick=${() => loadConfig({ silent: false })}>Reload From Disk</${Button}>
                                    <${Button} kind="ghost" onClick=${() => { window.location.href = API.logsLatest; }}>Download Latest Log</${Button}>
                                </div>
                            </div>

                            ${configMsg ? html`<div className="configMsg">${configMsg}</div>` : null}

                            <textarea
                                className="configArea"
                                value=${configText}
                                onInput=${(event) => setConfigText(event.target.value)}
                                spellCheck="false"
                            ></textarea>
                        </div>
                    </${Panel}>
                ` : null}

                ${activeTab === "chat" ? html`
                    <${Panel}>
                        <div className="cardBody">
                            <div className="sectionTitle">
                                <div>
                                    <span className="eyebrow">Chat</span>
                                    <h2 className="panelTitle">Live console stream and command composer</h2>
                                    <p>Watch chat in one pane and send commands in another without the current cramped split.</p>
                                </div>
                                <div className="chatStatus">
                                    <span className=${cls("dot", chatConnected && "live")}></span>
                                    <span>${chatConnected ? "WebSocket connected" : "Reconnecting chat stream"}</span>
                                </div>
                            </div>

                            <div className="chatLayout">
                                <div>
                                    <div className="chatBox" ref=${chatBoxRef}>
                                        ${(chat || []).length ? (chat || []).map((line, index) => html`
                                            <div key=${index} className="chatLine">${stripMc(line)}</div>
                                        `) : html`<div className="emptyState">Waiting for chat traffic...</div>`}
                                    </div>
                                </div>

                                <div className="composer">
                                    <textarea
                                        value=${chatInput}
                                        placeholder="Type in-game chat, /cofl commands, or compatibility commands here..."
                                        onInput=${(event) => setChatInput(event.target.value)}
                                        onKeyDown=${(event) => {
                                            if (event.key === "Enter" && !event.shiftKey) {
                                                event.preventDefault();
                                                sendChat();
                                            }
                                        }}
                                    ></textarea>

                                    <div className="presetRow">
                                        <${Button} kind="secondary" size="small" onClick=${() => setChatInput("/cofl ping")}>Insert /cofl ping</${Button}>
                                        <${Button} kind="secondary" size="small" onClick=${() => setChatInput("/bz")}>Insert /bz</${Button}>
                                        <${Button} kind="secondary" size="small" onClick=${() => setChatInput("/ah")}>Insert /ah</${Button}>
                                        <${Button} kind="secondary" size="small" onClick=${() => setChatInput("/baf")}>Insert /baf</${Button}>
                                    </div>

                                    <div className="miniList">
                                        <div className="miniRow"><strong>Send message</strong><span>Press Enter to send. Use Shift + Enter for a new line.</span></div>
                                        <div className="miniRow"><strong>Console history</strong><span>Recent lines are kept in memory for this browser session.</span></div>
                                    </div>

                                    <div className="actionRow">
                                        <${Button} kind="primary" onClick=${sendChat}>Send Chat</${Button}>
                                        <${Button} kind="ghost" onClick=${() => setChatInput("")}>Clear Draft</${Button}>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </${Panel}>
                ` : null}
            </div>

            ${toast ? html`<div className="toast">${toast}</div>` : null}

            <${LoginOverlay}
                show=${needsAuth}
                password=${password}
                setPassword=${setPassword}
                error=${loginError}
                onLogin=${login}
                publicProfit=${publicProfit}
            />
        </main>
    `;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
