<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- OG_META_TAGS -->
<title>TWM Control Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
    --bg:#0d1214;
    --bg-soft:#141d20;
    --panel:rgba(19,27,30,.88);
    --panel-2:#1a2529;
    --panel-3:#223136;
    --line:rgba(217,231,226,.12);
    --line-strong:rgba(217,231,226,.22);
    --text:#edf5f2;
    --muted:#9db2ac;
    --warm:#f2b15c;
    --warm-2:#ffd08a;
    --mint:#73d2af;
    --mint-2:#9ce8c7;
    --blue:#81b7ff;
    --blue-2:#b8d4ff;
    --red:#ff8c74;
    --red-2:#ffb0a0;
    --shadow:0 24px 70px rgba(0,0,0,.34);
    --shadow-soft:0 14px 38px rgba(0,0,0,.24);
    --radius-xl:28px;
    --radius-lg:22px;
    --radius-md:16px;
    --radius-sm:12px;
    --content:1360px;
}
*,
*::before,
*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
    margin:0;
    min-height:100%;
    color:var(--text);
    font-family:"IBM Plex Sans",ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:
        radial-gradient(circle at top left,rgba(242,177,92,.18),transparent 28%),
        radial-gradient(circle at 84% 16%,rgba(115,210,175,.16),transparent 24%),
        linear-gradient(180deg,#0a0f10,#0d1214 38%,#11181a 100%);
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
        linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:48px 48px;
    mask-image:linear-gradient(180deg,rgba(0,0,0,.55),transparent 90%);
    opacity:.4;
}
a{color:inherit;text-decoration:none}
button,input,textarea{font:inherit}
button{color:inherit}
img{display:block;max-width:100%}
#root{min-height:100vh;position:relative;z-index:1}
.app{
    width:min(var(--content),calc(100% - 24px));
    margin:0 auto;
    padding:18px 0 32px;
}
.surface{
    position:relative;
    overflow:hidden;
    border:1px solid var(--line);
    border-radius:var(--radius-xl);
    background:var(--panel);
    box-shadow:var(--shadow-soft);
    backdrop-filter:blur(18px);
}
.surface::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:linear-gradient(160deg,rgba(255,255,255,.12),rgba(255,255,255,.03) 28%,transparent 65%);
}
.surface > *{position:relative;z-index:1}
.topbar{
    position:sticky;
    top:14px;
    z-index:50;
    padding:18px 20px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:16px;
}
.brandWrap{display:flex;align-items:center;gap:14px;min-width:0}
.brandMark{
    width:56px;
    height:56px;
    border-radius:18px;
    display:grid;
    place-items:center;
    background:linear-gradient(135deg,var(--warm),var(--warm-2));
    color:#101618;
    font-family:"Space Grotesk",sans-serif;
    font-weight:700;
    letter-spacing:.08em;
    box-shadow:0 14px 28px rgba(242,177,92,.22);
}
.brandText h1{
    margin:0;
    font-family:"Space Grotesk",sans-serif;
    font-size:clamp(1.6rem,2vw,2rem);
    letter-spacing:-.04em;
}
.eyebrow{
    display:block;
    color:var(--warm);
    font-size:.76rem;
    text-transform:uppercase;
    letter-spacing:.16em;
    font-weight:700;
}
.brandMeta{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:8px;
}
.pill,
.statusBadge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    min-height:34px;
    padding:0 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.04);
    color:var(--muted);
    font-size:.84rem;
    white-space:nowrap;
}
.statusBadge strong{color:var(--text);font-weight:600}
.tone-green{color:var(--mint-2);border-color:rgba(115,210,175,.22);background:rgba(115,210,175,.12)}
.tone-gold{color:var(--warm-2);border-color:rgba(242,177,92,.24);background:rgba(242,177,92,.12)}
.tone-blue{color:var(--blue-2);border-color:rgba(129,183,255,.24);background:rgba(129,183,255,.12)}
.tone-red{color:var(--red-2);border-color:rgba(255,140,116,.24);background:rgba(255,140,116,.12)}
.toolbar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
}
.tabbar{
    margin-top:16px;
    padding:8px;
    display:flex;
    gap:8px;
    overflow:auto;
    scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{display:none}
.tab{
    border:0;
    min-height:42px;
    padding:0 14px;
    border-radius:999px;
    background:rgba(255,255,255,.04);
    color:var(--muted);
    cursor:pointer;
    white-space:nowrap;
    transition:background .18s ease,color .18s ease,transform .18s ease;
}
.tab:hover{transform:translateY(-1px);color:var(--text)}
.tab.active{
    background:linear-gradient(135deg,var(--warm),var(--warm-2));
    color:#101618;
    font-weight:700;
}
.button{
    border:1px solid transparent;
    min-height:44px;
    padding:0 16px;
    border-radius:999px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    cursor:pointer;
    transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease;
}
.button:hover{transform:translateY(-1px)}
.button.primary{
    color:#101618;
    background:linear-gradient(135deg,var(--warm),var(--warm-2));
    box-shadow:0 14px 24px rgba(242,177,92,.18);
}
.button.secondary{
    background:rgba(255,255,255,.04);
    border-color:var(--line);
}
.button.success{
    color:#092018;
    background:linear-gradient(135deg,var(--mint),var(--mint-2));
}
.button.warn{
    color:#211406;
    background:linear-gradient(135deg,var(--warm),#ffe0a8);
}
.button.danger{
    color:#fff6f3;
    background:linear-gradient(135deg,var(--red),#ff7256);
}
.button.ghost{
    background:transparent;
    border-color:var(--line);
}
.button.small{
    min-height:34px;
    padding:0 12px;
    font-size:.84rem;
}
.button.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.layout{
    margin-top:18px;
    display:grid;
    gap:18px;
}
.hero{
    padding:24px;
    display:grid;
    grid-template-columns:1fr;
    gap:22px;
}
.heroCopy h2,
.sectionTitle h2,
.panelTitle,
.loginPanel h2{
    margin:0;
    font-family:"Space Grotesk",sans-serif;
    letter-spacing:-.04em;
    line-height:.98;
}
.heroCopy h2{
    font-size:clamp(2rem,4vw,3.5rem);
    max-width:13ch;
}
.subtle{
    color:var(--muted);
    line-height:1.65;
}
.heroCopy .subtle{margin-top:16px;max-width:60ch}
.heroActions{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:20px;
}
.heroMeta{
    margin-top:20px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}
.heroAside{
    display:grid;
    grid-template-columns:minmax(0,1.25fr) minmax(300px,.75fr);
    gap:16px;
}
.statGrid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
}
.statCard{
    padding:16px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.07);
    background:rgba(255,255,255,.035);
}
.statCard small{
    display:block;
    color:var(--muted);
    font-size:.74rem;
    text-transform:uppercase;
    letter-spacing:.16em;
}
.statCard strong{
    display:block;
    margin-top:8px;
    font-size:1.45rem;
    letter-spacing:-.05em;
}
.statCard span{
    display:block;
    margin-top:6px;
    color:var(--muted);
    font-size:.84rem;
}
.dashboardGrid{
    display:grid;
    grid-template-columns:minmax(0,1.15fr) minmax(320px,.85fr);
    gap:18px;
}
.stack{display:grid;gap:18px}
.cardBody{padding:22px}
.sectionTitle{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
}
.sectionTitle h2{font-size:1.55rem}
.sectionTitle p{
    margin:10px 0 0;
    color:var(--muted);
    max-width:64ch;
}
.actionGrid{
    margin-top:18px;
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
}
.actionCard{
    padding:16px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.07);
    background:rgba(255,255,255,.03);
}
.actionCard h3{
    margin:0 0 6px;
    font-size:1rem;
}
.actionCard p{
    margin:0 0 12px;
    color:var(--muted);
    font-size:.9rem;
}
.actionRow,
.toggleList,
.accountList,
.inlineMeta{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}
.toggleCard{
    padding:18px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.07);
    background:rgba(255,255,255,.03);
}
.toggleHead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
}
.toggleHead h3{
    margin:0;
    font-size:1rem;
}
.toggleCard p{
    margin:8px 0 14px;
    color:var(--muted);
}
.twoCol{
    display:grid;
    grid-template-columns:minmax(0,1.08fr) minmax(320px,.92fr);
    gap:18px;
}
.threeCol{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:18px;
}
.chartWrap{height:300px}
.kpiStrip{
    margin-top:16px;
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:12px;
}
.kpi{
    padding:14px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.07);
    background:rgba(255,255,255,.03);
}
.kpi small{
    display:block;
    font-size:.74rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--muted);
}
.kpi strong{
    display:block;
    margin-top:8px;
    font-size:1.2rem;
}
.miniList{
    margin-top:16px;
    display:grid;
    gap:10px;
}
.miniRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:12px 14px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.06);
    background:rgba(255,255,255,.03);
}
.miniRow strong{font-size:.96rem}
.miniRow span{color:var(--muted);font-size:.88rem}
.inventoryLayout{
    margin-top:18px;
    display:grid;
    grid-template-columns:minmax(0,1fr) 320px;
    gap:18px;
}
.inventoryBoard{
    border:1px solid rgba(255,255,255,.06);
    border-radius:18px;
    padding:16px;
    background:
        linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01)),
        linear-gradient(180deg,#162024,#11181b);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        inset 0 0 0 1px rgba(0,0,0,.24),
        0 12px 24px rgba(0,0,0,.18);
}
.inventoryBoardBar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
}
.inventoryBoardTitle{
    display:flex;
    flex-direction:column;
    gap:4px;
}
.inventoryBoardTitle strong{
    font-size:.95rem;
    letter-spacing:.02em;
}
.inventoryBoardTitle span{
    color:var(--muted);
    font-size:.8rem;
}
.inventoryHint{
    display:inline-flex;
    align-items:center;
    min-height:28px;
    padding:0 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(0,0,0,.18);
    color:var(--muted);
    font-size:.76rem;
}
.slotGrid{
    display:grid;
    grid-template-columns:repeat(9,minmax(0,1fr));
    gap:8px;
}
.slotButton{
    position:relative;
    aspect-ratio:1 / 1;
    border:1px solid rgba(255,255,255,.06);
    border-radius:10px;
    padding:6px;
    background:
        linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.01)),
        linear-gradient(180deg,#27343a,#1a2428);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        inset 0 -1px 0 rgba(0,0,0,.42);
    cursor:pointer;
    text-align:left;
    transition:border-color .18s ease,transform .18s ease,background .18s ease,box-shadow .18s ease;
}
.slotButton:hover{
    transform:translateY(-1px);
    border-color:rgba(255,255,255,.14);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        inset 0 -1px 0 rgba(0,0,0,.46),
        0 8px 18px rgba(0,0,0,.18);
}
.slotButton.empty{
    background:
        linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.01)),
        linear-gradient(180deg,#1d272b,#141b1f);
}
.slotButton.active{
    border-color:rgba(242,177,92,.55);
    background:
        linear-gradient(180deg,rgba(255,208,138,.18),rgba(255,208,138,.04)),
        linear-gradient(180deg,#314046,#212d31);
    box-shadow:
        inset 0 0 0 1px rgba(255,208,138,.18),
        0 0 0 1px rgba(242,177,92,.16),
        0 10px 22px rgba(0,0,0,.22);
}
.slotId{
    display:block;
    color:var(--muted);
    font-size:.58rem;
    letter-spacing:.12em;
    text-transform:uppercase;
}
.slotIcon{
    margin-top:4px;
    height:calc(100% - 18px);
    min-height:54px;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:
        linear-gradient(180deg,rgba(0,0,0,.28),rgba(0,0,0,.18)),
        rgba(0,0,0,.22);
}
.slotIcon img{
    width:70%;
    height:70%;
    object-fit:contain;
    image-rendering:pixelated;
}
.slotFallback{
    font-size:.72rem;
    color:var(--muted);
    text-align:center;
    padding:0 4px;
    line-height:1.3;
}
.slotLabel{
    display:none;
}
.slotCount{
    position:absolute;
    right:6px;
    bottom:5px;
    min-width:18px;
    padding:0 3px;
    border-radius:6px;
    background:rgba(0,0,0,.54);
    font-size:.72rem;
    font-weight:700;
    text-align:center;
    text-shadow:1px 1px 0 rgba(0,0,0,.82);
}
.inventoryInspector{
    border:1px solid rgba(255,255,255,.06);
    border-radius:18px;
    padding:16px;
    background:
        linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015)),
        linear-gradient(180deg,#131b1f,#0f1518);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        inset 0 0 0 1px rgba(0,0,0,.2);
}
.inventoryInspector .detailCard{
    padding:0;
    border:0;
    border-radius:0;
    background:transparent;
    box-shadow:none;
}
.detailCard{
    padding:18px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.07);
    background:rgba(255,255,255,.03);
    display:grid;
    gap:14px;
    align-content:start;
}
.detailTop{
    display:flex;
    align-items:center;
    gap:14px;
}
.detailTop .slotIcon{
    width:72px;
    min-width:72px;
    height:72px;
}
.inventoryInspector .detailTop .slotIcon{
    width:88px;
    min-width:88px;
    height:88px;
    border-radius:12px;
}
.inventoryInspector .miniRow{
    border-radius:12px;
    background:rgba(0,0,0,.18);
}
.detailTitle{
    margin:0;
    font-size:1.1rem;
    word-break:break-word;
}
.detailMeta{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}
.mcTooltipAnchor{
    display:block;
}
.mcTooltipAnchor.inline{
    display:inline-block;
    width:100%;
}
.mcTooltip{
    position:fixed;
    z-index:260;
    pointer-events:none;
    min-width:220px;
    max-width:min(420px,calc(100vw - 24px));
    padding:4px;
    border:2px solid rgba(51,16,102,.96);
    background:rgba(16,1,16,.96);
    box-shadow:
        0 0 0 2px rgba(0,0,0,.78),
        0 12px 28px rgba(0,0,0,.45);
}
.mcTooltip::before{
    content:"";
    position:absolute;
    inset:2px;
    border:1px solid rgba(112,72,196,.78);
    pointer-events:none;
}
.mcTooltipInner{
    position:relative;
    z-index:1;
}
.mcTooltipTitle,
.mcTooltipLine{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:.92rem;
    line-height:1.35;
    text-shadow:2px 2px 0 rgba(0,0,0,.78);
    white-space:pre-wrap;
    word-break:break-word;
}
.mcTooltipTitle{
    margin-bottom:4px;
}
.mcTooltipLine + .mcTooltipLine{
    margin-top:2px;
}
.mcLine{
    display:block;
}
.mcFragment{}
.mcBold{font-weight:700}
.mcItalic{font-style:italic}
.mcUnderline{text-decoration:underline}
.mcStrike{text-decoration:line-through}
.mcObfuscated{
    letter-spacing:.08em;
    filter:blur(.35px);
}
.mcColor0{color:#000000}
.mcColor1{color:#0000aa}
.mcColor2{color:#00aa00}
.mcColor3{color:#00aaaa}
.mcColor4{color:#aa0000}
.mcColor5{color:#aa00aa}
.mcColor6{color:#ffaa00}
.mcColor7{color:#aaaaaa}
.mcColor8{color:#555555}
.mcColor9{color:#5555ff}
.mcColorA{color:#55ff55}
.mcColorB{color:#55ffff}
.mcColorC{color:#ff5555}
.mcColorD{color:#ff55ff}
.mcColorE{color:#ffff55}
.mcColorF{color:#ffffff}
.tableShell{
    margin-top:18px;
    display:grid;
    grid-template-columns:1.15fr .85fr;
    gap:16px;
}
.tableWrap{
    overflow:auto;
    border:1px solid rgba(255,255,255,.06);
    border-radius:18px;
    background:rgba(0,0,0,.16);
}
table{
    width:100%;
    border-collapse:collapse;
    min-width:640px;
}
th,td{
    padding:14px 12px;
    text-align:left;
    vertical-align:top;
    border-bottom:1px solid rgba(255,255,255,.06);
}
th{
    position:sticky;
    top:0;
    z-index:1;
    font-size:.72rem;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--muted);
    background:rgba(17,24,26,.96);
}
tbody tr{
    cursor:pointer;
    transition:background .18s ease;
}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody tr.selected{background:rgba(129,183,255,.10)}
.rowTitle{
    font-weight:700;
    line-height:1.35;
}
.rowSub{
    margin-top:4px;
    color:var(--muted);
    font-size:.82rem;
}
.emptyState{
    padding:42px 18px;
    text-align:center;
    color:var(--muted);
}
.tagList{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}
.tag{
    display:inline-flex;
    align-items:center;
    min-height:28px;
    padding:0 10px;
    border-radius:999px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.07);
    color:var(--muted);
    font-size:.8rem;
}
.queueList{
    margin-top:18px;
    display:grid;
    gap:10px;
}
.queueEntry{
    padding:14px 16px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.07);
    background:rgba(255,255,255,.03);
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:flex-start;
}
.queueEntry.executing{
    border-color:rgba(115,210,175,.28);
    background:rgba(115,210,175,.10);
}
.queueEntry h3{
    margin:0;
    font-size:.98rem;
}
.queueEntry p{
    margin:4px 0 0;

<body>
<div id="root"></div>
<script>
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const html = htm.bind(React.createElement);

const API = {
    status: "/api/status",
    login: "/api/login",
    profit: "/api/profit",
    publicProfit: "/api/profit/public",
    inventory: "/api/inventory",
    gameView: "/api/game-view",
    auctions: "/api/auctions",
    bazaarOrders: "/api/bazaar_orders",
    queue: "/api/queue",
    config: "/api/config",
    pause: "/api/pause",
    resume: "/api/resume",
    toggleAh: "/api/toggle_ah",
    toggleBazaar: "/api/toggle_bazaar",
    toggleAnon: "/api/toggle_anonymize",
    switchAccount: "/api/switch_account",
    claimPurchases: "/api/claim_purchases",
    collectBz: "/api/collect_bz_orders",
    claimBz: "/api/claim_bz_orders",
    cancelAllBz: "/api/cancel_all_bz_orders",
    cancelAuction: "/api/cancel_auction",
    cancelBz: "/api/cancel_bz_order",
    chatSend: "/api/chat/send",
    logsLatest: "/api/logs/latest",
    chatWs: () => `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/api/chat/ws`
};

const TAB_DEFS = [
    ["dashboard", "Dashboard"],
    ["analytics", "Analytics"],
    ["inventory", "Inventory"],
    ["market", "Market"],
    ["queue", "Queue"],
    ["config", "Config"],
    ["chat", "Chat"]
];

function cls(...parts) {
    return parts.filter(Boolean).join(" ");
}

function stripMc(text) {
    return (text || "").replace(/\u00A7[0-9A-FK-OR]/gi, "");
}

const MC_COLOR_CLASS = {
    "0": "mcColor0",
    "1": "mcColor1",
    "2": "mcColor2",
    "3": "mcColor3",
    "4": "mcColor4",
    "5": "mcColor5",
    "6": "mcColor6",
    "7": "mcColor7",
    "8": "mcColor8",
    "9": "mcColor9",
    "a": "mcColorA",
    "b": "mcColorB",
    "c": "mcColorC",
    "d": "mcColorD",
    "e": "mcColorE",
    "f": "mcColorF",
};

function defaultMcStyle() {
    return {
        colorClass: "mcColorF",
        bold: false,
        italic: false,
        underline: false,
        strike: false,
        obfuscated: false,
    };
}

function parseMcSegments(text) {
    const source = String(text ?? "");
    const segments = [];
    let style = defaultMcStyle();
    let buffer = "";

    const flush = () => {
        if (!buffer) return;
        segments.push({
            text: buffer,
            colorClass: style.colorClass,
            bold: style.bold,
            italic: style.italic,
            underline: style.underline,
            strike: style.strike,
            obfuscated: style.obfuscated,
        });
        buffer = "";
    };

    for (let i = 0; i < source.length; i += 1) {
        const char = source[i];
        if (char === "\u00A7" && i + 1 < source.length) {
            const code = source[i + 1].toLowerCase();
            i += 1;
            flush();
            if (MC_COLOR_CLASS[code]) {
                style = { ...defaultMcStyle(), colorClass: MC_COLOR_CLASS[code] };
                continue;
            }
            if (code === "l") {
                style = { ...style, bold: true };
            } else if (code === "m") {
                style = { ...style, strike: true };
            } else if (code === "n") {
                style = { ...style, underline: true };
            } else if (code === "o") {
                style = { ...style, italic: true };
            } else if (code === "k") {
                style = { ...style, obfuscated: true };
            } else if (code === "r") {
                style = defaultMcStyle();
            }
            continue;
        }
        buffer += char;
    }

    flush();

    if (!segments.length) {
        segments.push({ text: source, ...defaultMcStyle() });
    }

    return segments;
}

function mcSegmentClass(segment) {
    return cls(
        "mcFragment",
        segment.colorClass,
        segment.bold && "mcBold",
        segment.italic && "mcItalic",
        segment.underline && "mcUnderline",
        segment.strike && "mcStrike",
        segment.obfuscated && "mcObfuscated"
    );
}

function getTooltipData(item) {
    if (!item || item.empty) return null;
    const title =
        item.displayNameColored ||
        item.displayName ||
        item.item_name ||
        item.name ||
        "";
    const lines = Array.isArray(item.lore) ? item.lore.filter((line) => line != null && line !== "") : [];
    if (!title && !lines.length) return null;
    return { title, lines };
}

function coins(value) {
    if (value == null || Number.isNaN(Number(value))) return "-";
    const n = Number(value);
    const abs = Math.abs(n);
    if (abs >= 1e9) return `${(n / 1e9).toFixed(2)}B`;
    if (abs >= 1e6) return `${(n / 1e6).toFixed(2)}M`;
    if (abs >= 1e3) return `${(n / 1e3).toFixed(1)}K`;
    return `${Math.round(n)}`;
}

function formatCoinsLong(value) {
    if (value == null || Number.isNaN(Number(value))) return "-";
    return `${Number(value).toLocaleString()} coins`;
}

function uptime(seconds) {
    if (seconds == null || Number.isNaN(Number(seconds))) return "-";
    const s = Math.max(0, Math.floor(Number(seconds)));
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (d > 0) return `${d}d ${h}h ${m}m`;
    if (h > 0) return `${h}h ${m}m ${sec}s`;
    return `${m}m ${sec}s`;
}

function ageFromMs(ms) {
    if (ms == null) return "-";
    return uptime(Math.floor(ms / 1000));
}

function formatPlacedAt(epochSeconds) {
    if (!epochSeconds) return "-";
    return new Date(epochSeconds * 1000).toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
    });
}

function humanizeIdentifier(value) {
    if (value == null || value === "") return "-";
    return String(value)
        .replace(/^Status(?=[A-Z])/, "")
        .replace(/[_-]+/g, " ")
        .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
        .replace(/([A-Z])([A-Z][a-z])/g, "$1 $2")
        .trim();
}

function safeTag(slot) {
    const raw = slot?.tag || stripMc(slot?.displayName || slot?.name || "");
    const normalized = raw
        .toUpperCase()
        .replace(/[^A-Z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    return normalized || "";
}

function slotName(slot) {
    return stripMc(slot?.displayName || slot?.name || "Empty");
}

function slotIconUrl(slot) {
    const tag = safeTag(slot);
    return tag ? `https://sky.coflnet.com/static/icon/${tag}` : "";
}

function mergeProfitSeries(ahPoints, bzPoints) {
    const events = [
        ...((ahPoints || []).map(([ts, value]) => ({ ts, kind: "ah", value: value || 0 }))),
        ...((bzPoints || []).map(([ts, value]) => ({ ts, kind: "bz", value: value || 0 }))),
    ].sort((a, b) => a.ts - b.ts);

    let currentAh = 0;
    let currentBz = 0;

    return events.map((event) => {
        if (event.kind === "ah") {
            currentAh = event.value;
        } else {
            currentBz = event.value;
        }
        return [event.ts, currentAh + currentBz];
    });
}

async function req(url, options = {}) {
    const response = await fetch(url, options);
    if (response.status === 401) {
        const error = new Error("Unauthorized");
        error.status = 401;
        throw error;
    }
    if (!response.ok) {
        const text = await response.text().catch(() => "");
        const error = new Error(text || `HTTP ${response.status}`);
        error.status = response.status;
        throw error;
    }
    const contentType = response.headers.get("content-type") || "";
    if (contentType.includes("json")) {
        return response.json();
    }
    const text = await response.text();
    const trimmed = text.trim();
    if ((trimmed.startsWith("{") && trimmed.endsWith("}")) || (trimmed.startsWith("[") && trimmed.endsWith("]"))) {
        try {
            return JSON.parse(trimmed);
        } catch {
            return text;
        }
    }
    return text;
}

const Panel = ({ className, children }) => html`
    <section className=${cls("surface", className)}>
        ${children}
    </section>
`;

const Button = ({ className, kind = "secondary", size = "", children, ...props }) => html`
    <button className=${cls("button", kind, size, className)} ...${props}>${children}</button>
`;

const StatusBadge = ({ label, value, tone = "" }) => html`
    <span className=${cls("statusBadge", tone)}>
        ${label ? html`<span>${label}</span>` : null}
        <strong>${value}</strong>
    </span>
`;

const StatCard = ({ label, value, sub, tone = "" }) => html`
    <div className="statCard">
        <small>${label}</small>
        <strong className=${tone}>${value}</strong>
        ${sub ? html`<span>${sub}</span>` : null}
    </div>
`;

function MinecraftText({ text, className = "" }) {
    const segments = useMemo(() => parseMcSegments(text), [text]);

    return html`
        <span className=${cls("mcLine", className)}>
            ${segments.map((segment, index) => html`
                <span key=${index} className=${mcSegmentClass(segment)}>${segment.text}</span>
            `)}
        </span>
    `;
}

function MinecraftHoverTooltip({ tooltip, position }) {
    if (!tooltip) return null;
    const viewportWidth = window.innerWidth || 1280;
    const viewportHeight = window.innerHeight || 720;
    const width = Math.min(420, Math.max(220, viewportWidth - 24));
    let left = position.x + 18;
    if (left + width > viewportWidth - 12) {
        left = Math.max(12, position.x - width - 18);
    }
    let top = position.y + 18;
    if (top > viewportHeight - 180) {
        top = Math.max(12, position.y - 18);
    }

    return ReactDOM.createPortal(
        html`
            <div className="mcTooltip" style=${{ left: `${left}px`, top: `${top}px`, maxWidth: `${width}px` }}>
                <div className="mcTooltipInner">
                    ${tooltip.title ? html`
                        <div className="mcTooltipTitle">
                            <${MinecraftText} text=${tooltip.title} />
                        </div>
                    ` : null}
                    ${(tooltip.lines || []).map((line, index) => html`
                        <div key=${index} className="mcTooltipLine">
                            <${MinecraftText} text=${line} />
                        </div>
                    `)}
                </div>
            </div>
        `,
        document.body
    );
}

function TooltipAnchor({
    as = "div",
    tooltip = null,
    className = "",
    children,
    onMouseEnter,
    onMouseMove,
    onMouseLeave,
    onFocus,
    onBlur,
    ...props
}) {
    const Tag = as;
    const [visible, setVisible] = useState(false);
    const [position, setPosition] = useState({ x: 0, y: 0 });

    const anchorPoint = (event) => {
        const rect = event.currentTarget?.getBoundingClientRect?.();
        return {
            x: event.clientX || (rect ? rect.left + Math.min(rect.width * 0.5, 120) : 0),
            y: event.clientY || (rect ? rect.top + Math.min(rect.height * 0.5, 40) : 0),
        };
    };

    const showTooltip = (event) => {
        if (!tooltip) return;
        setVisible(true);
        setPosition(anchorPoint(event));
    };

    const hideTooltip = () => setVisible(false);

    return html`
        <${React.Fragment}>
            <${Tag}
                className=${cls("mcTooltipAnchor", className)}
                onMouseEnter=${(event) => {
                    showTooltip(event);
                    if (onMouseEnter) onMouseEnter(event);
                }}
                onMouseMove=${(event) => {
                    if (tooltip) {
                        setPosition(anchorPoint(event));
                    }
                    if (onMouseMove) onMouseMove(event);
                }}
                onMouseLeave=${(event) => {
                    hideTooltip();
                    if (onMouseLeave) onMouseLeave(event);
                }}
                onFocus=${(event) => {
                    showTooltip(event);
                    if (onFocus) onFocus(event);
                }}
                onBlur=${(event) => {
                    hideTooltip();
                    if (onBlur) onBlur(event);
                }}
                ...${props}
            >
                ${children}
            </${Tag}>
            ${visible && tooltip ? html`<${MinecraftHoverTooltip} tooltip=${tooltip} position=${position} />` : null}
        </${React.Fragment}>
    `;
}

function ChartCard({ title, subtitle, points, color, fill, height = 300 }) {
    const canvasRef = useRef(null);
    const chartRef = useRef(null);

    useEffect(() => {
        if (!canvasRef.current || !window.Chart) return undefined;

        if (chartRef.current) {
            chartRef.current.destroy();
        }

        const labels = (points || []).map(([ts]) =>
            new Date(ts * 1000).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            })
        );

        chartRef.current = new Chart(canvasRef.current, {
            type: "line",
            data: {
                labels,
                datasets: [
                    {
                        data: (points || []).map(([, value]) => value),
                        borderColor: color,
                        backgroundColor: fill,
                        fill: true,
                        tension: 0.32,
                        pointRadius: 0,
                        borderWidth: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: "index" },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (context) => formatCoinsLong(context.parsed.y)
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: "rgba(255,255,255,.04)" },
                        ticks: { color: "#9db2ac", maxTicksLimit: 6 }
                    },
                    y: {
                        grid: { color: "rgba(255,255,255,.04)" },
                        ticks: {
                            color: "#9db2ac",
                            callback: (value) => coins(value)
                        }
                    }
                }
            }
        });

        return () => {
            if (chartRef.current) {
                chartRef.current.destroy();
                chartRef.current = null;
            }
        };
    }, [points, color, fill]);

    return html`
        <${Panel}>
            <div className="cardBody">
                <div className="sectionTitle">
                    <div>
                        <span className="eyebrow">Profit</span>
                        <h2 className="panelTitle">${title}</h2>
                        ${subtitle ? html`<p>${subtitle}</p>` : null}
                    </div>
                </div>
                <div className="chartWrap" style=${{ height: `${height}px` }}>
                    <canvas ref=${canvasRef}></canvas>
                </div>
            </div>
        </${Panel}>
    `;
}

function InventoryPanel({ title, subtitle, slots }) {
    const list = Array.isArray(slots) ? slots : [];
    const defaultIndex = Math.max(0, list.findIndex((slot) => !slot?.empty && (slot?.name || slot?.displayName)));
    const [activeIndex, setActiveIndex] = useState(defaultIndex);

    useEffect(() => {
        if (!list.length) {
            setActiveIndex(0);
            return;
        }
        if (activeIndex >= list.length || activeIndex < 0) {
            setActiveIndex(Math.max(0, list.findIndex((slot) => !slot?.empty && (slot?.name || slot?.displayName))));
        }
    }, [list, activeIndex]);

    const selected = list[activeIndex] || list[defaultIndex] || {};
    const selectedName = slotName(selected);
    const selectedIcon = slotIconUrl(selected);
    const selectedTooltip = getTooltipData(selected);
    const selectedTitle = selected?.displayNameColored || selected?.displayName || selectedName;

    return html`
        <${Panel}>
            <div className="cardBody">
                <div className="sectionTitle">
                    <div>
                        <span className="eyebrow">Inspection</span>
                        <h2 className="panelTitle">${title}</h2>
                        <p>${subtitle}</p>
                    </div>
                    <div className="tagList">
                        <span className="tag">${list.length} slots</span>
                        ${selected?.tag ? html`<span className="tag mono">${selected.tag}</span>` : null}
                    </div>
                </div>

                ${!list.length ? html`<div className="emptyState">No slot data yet.</div>` : html`
                    <div className="inventoryLayout">
                        <div className="inventoryBoard">
                            <div className="inventoryBoardBar">
                                <div className="inventoryBoardTitle">
                                    <strong>${title}</strong>
                                    <span>Hover for tooltip, click to inspect</span>
                                </div>
                                <span className="inventoryHint">${list.length} slots</span>
                            </div>

                            <div className="slotGrid">
                                ${list.map((slot, index) => {
                                    const empty = slot?.empty || (!slot?.name && !slot?.displayName);
                                    const icon = slotIconUrl(slot);
                                    const label = slotName(slot);
                                    const tooltip = getTooltipData(slot);
                                    return html`
                                        <${TooltipAnchor}
                                            key=${`${slot?.slot ?? index}-${label}`}
                                            as="button"
                                            type="button"
                                            tooltip=${tooltip}
                                            aria-label=${empty ? `Empty slot ${slot?.slot ?? index}` : `${label} in slot ${slot?.slot ?? index}`}
                                            className=${cls("slotButton", empty && "empty", activeIndex === index && "active")}
                                            onClick=${() => setActiveIndex(index)}
                                        >
                                            <span className="slotId">#${slot?.slot ?? index}</span>
                                            <div className="slotIcon">
                                                ${icon && !empty ? html`
                                                    <img src=${icon} alt=${label} onError=${(event) => { event.currentTarget.style.display = "none"; }} />
                                                ` : html`
                                                    <span className="slotFallback">${empty ? "Empty" : label.slice(0, 20)}</span>
                                                `}
                                            </div>
                                            ${!empty && Number(slot?.count) > 1 ? html`<span className="slotCount">${slot.count}</span>` : null}
                                        </${TooltipAnchor}>
                                    `;
                                })}
                            </div>
                        </div>

                        <div className="inventoryInspector">
                        <div className="detailCard">
                            <div className="detailTop">
                                <${TooltipAnchor} tooltip=${selectedTooltip} className="inline">
                                <div className="slotIcon">
                                    ${selectedIcon && !selected?.empty ? html`
                                        <img src=${selectedIcon} alt=${selectedName} onError=${(event) => { event.currentTarget.style.display = "none"; }} />
                                    ` : html`
                                        <span className="slotFallback">${selected?.empty ? "Empty" : selectedName.slice(0, 24)}</span>
                                    `}
                                </div>
                                </${TooltipAnchor}>
                                <${TooltipAnchor} tooltip=${selectedTooltip} className="inline">
                                <div>
                                    <span className="eyebrow">Selected Slot</span>

function MarketTableCard({ title, subtitle, rows, emptyText, columns, detailRenderer, keyFn, summaryTags }) {
    const safeRows = Array.isArray(rows) ? rows : [];
    const initialKey = safeRows.length ? keyFn(safeRows[0], 0) : null;
    const [selectedKey, setSelectedKey] = useState(initialKey);

    useEffect(() => {
        if (!safeRows.length) {
            setSelectedKey(null);
            return;
        }
        const currentExists = safeRows.some((row, index) => keyFn(row, index) === selectedKey);
        if (!currentExists) {
            setSelectedKey(keyFn(safeRows[0], 0));
        }
    }, [safeRows, selectedKey, keyFn]);

    const selectedRow = safeRows.find((row, index) => keyFn(row, index) === selectedKey) || safeRows[0] || null;

    return html`
        <${Panel}>
            <div className="cardBody">
                <div className="sectionTitle">
                    <div>
                        <span className="eyebrow">Market</span>
                        <h2 className="panelTitle">${title}</h2>
                        <p>${subtitle}</p>
                    </div>
                    <div className="tagList">
                        ${(summaryTags || []).map((tag, index) => html`<span className="tag" key=${index}>${tag}</span>`)}
                    </div>
                </div>

                ${!safeRows.length ? html`
                    <div className="emptyState">${emptyText}</div>
                ` : html`
                    <div className="tableShell">
                        <div className="tableWrap">
                            <table>
                                <thead>
                                    <tr>
                                        ${columns.map((column) => html`<th key=${column.label}>${column.label}</th>`)}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${safeRows.map((row, index) => {
                                        const rowKey = keyFn(row, index);
                                        return html`
                                            <tr
                                                key=${rowKey}
                                                className=${selectedKey === rowKey ? "selected" : ""}
                                                onClick=${() => setSelectedKey(rowKey)}
                                            >
                                                ${columns.map((column) => html`
                                                    <td key=${column.label}>
                                                        ${column.render ? column.render(row, index) : row[column.key]}
                                                    </td>
                                                `)}
                                            </tr>
                                        `;
                                    })}
                                </tbody>
                            </table>
                        </div>

                        <div className="detailCard">
                            ${selectedRow ? detailRenderer(selectedRow) : html`<div className="muted">No row selected.</div>`}
                        </div>
                    </div>
                `}
            </div>
        </${Panel}>
    `;
}

                        <h2 className="panelTitle">Current work and limits</h2>

                <div className="kpiStrip">

                    <div className="kpi"><small>Bazaar Limit</small><strong>${status.bazaar_at_limit ? "Reached" : "Clear"}</strong></div>
                    <div className="kpi"><small>Auction Limit</small><strong>${status.auction_at_limit ? "Reached" : "Clear"}</strong></div>
