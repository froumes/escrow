name: Build and Release

on:
  push:
    branches:
      - main
      - 'codex/**'
    tags:
      - 'v*'
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    # Only run on merged PRs or direct pushes to main
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: twm
            asset_name: twm-linux-x86_64
            loader_artifact_name: TWM-loader
            loader_asset_name: TWM-loader-linux-x86_64
            
          # macOS x86_64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: twm
            asset_name: twm-macos-x86_64
            loader_artifact_name: TWM-loader
            loader_asset_name: TWM-loader-macos-x86_64
            
          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: twm
            asset_name: twm-macos-arm64
            loader_artifact_name: TWM-loader
            loader_asset_name: TWM-loader-macos-arm64
            
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: twm.exe
            asset_name: twm-windows-x86_64.exe
            loader_artifact_name: TWM-loader.exe
            loader_asset_name: TWM-loader-windows-x86_64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binaries (Linux and macOS)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          strip target/${{ matrix.target }}/release/${{ matrix.loader_artifact_name }}

      - name: Rename binaries
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          mv ${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          mv ${{ matrix.loader_artifact_name }} ${{ matrix.loader_asset_name }}

      - name: Upload main artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Upload loader artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.loader_asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.loader_asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -R ./artifacts

      - name: Get version
        id: version
        run: |
          # If this is a tag push, use the tag name
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            # Otherwise use the commit SHA
            VERSION="build-$(date +%Y%m%d)-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## TWM Release ${{ steps.version.outputs.version }}
            
            Automated build from commit ${{ github.sha }}
            
            ### TWM-loader (Recommended)
            The loader automatically checks for updates on startup and downloads the latest version.
            Just run the loader instead of the main binary.
            
            - **Linux (x86_64)**: `TWM-loader-linux-x86_64`
            - **macOS (Intel)**: `TWM-loader-macos-x86_64`
            - **macOS (Apple Silicon)**: `TWM-loader-macos-arm64`
            - **Windows (x86_64)**: `TWM-loader-windows-x86_64.exe`
            
            ### Manual Downloads (main binary)
            - **Linux (x86_64)**: `twm-linux-x86_64`
            - **macOS (Intel)**: `twm-macos-x86_64`
            - **macOS (Apple Silicon)**: `twm-macos-arm64`
            - **Windows (x86_64)**: `twm-windows-x86_64.exe`
            
            ### Installation
            
            **Linux/macOS (using loader):**
            ```bash
            chmod +x TWM-loader-*
            chmod +x twm-*
            # Place both files in the same directory, then run:
            ./TWM-loader-*
            ```
            
            **Windows (using loader):**
            ```
            # Place both .exe files in the same directory, then run:
            TWM-loader-windows-x86_64.exe
            ```
            
            See [README.md](https://github.com/froumes/escrow/blob/main/README.md) for usage instructions.
          files: |
            ./artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

