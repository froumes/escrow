name: Build and Release

on:
  push:
    branches:
      - main
      - 'codex/**'
    tags:
      - 'v*'
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  build:
    name: Build ${{ matrix.target }}
    # Only run on merged PRs or direct pushes to main
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: twm
            asset_name: twm-linux-x86_64
            loader_artifact_name: TWM-loader
            loader_asset_name: TWM-loader-linux-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Build release binaries
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/codex/* ]]; then
            cargo build --profile ci-artifact --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Strip binaries (Linux and macOS)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        run: |
          PROFILE_DIR="release"
          if [[ "${GITHUB_REF}" == refs/heads/codex/* ]]; then
            PROFILE_DIR="ci-artifact"
          fi
          strip target/${{ matrix.target }}/${PROFILE_DIR}/${{ matrix.artifact_name }}
          strip target/${{ matrix.target }}/${PROFILE_DIR}/${{ matrix.loader_artifact_name }}

      - name: Rename binaries
        shell: bash
        run: |
          PROFILE_DIR="release"
          if [[ "${GITHUB_REF}" == refs/heads/codex/* ]]; then
            PROFILE_DIR="ci-artifact"
          fi
          cd target/${{ matrix.target }}/${PROFILE_DIR}
          mv ${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          mv ${{ matrix.loader_artifact_name }} ${{ matrix.loader_asset_name }}

      - name: Upload main artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/**/${{ matrix.asset_name }}

      - name: Upload loader artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.loader_asset_name }}
          path: target/${{ matrix.target }}/**/${{ matrix.loader_asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -R ./artifacts

      - name: Get version
        id: version
        run: |
          # If this is a tag push, use the tag name
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            # Otherwise use the commit SHA
            VERSION="build-$(date +%Y%m%d)-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## TWM Release ${{ steps.version.outputs.version }}
            
            Automated build from commit ${{ github.sha }}
            
            ### TWM-loader (Recommended)
            The loader automatically checks for updates on startup and downloads the latest version.
            Just run the loader instead of the main binary.
            
            - **Linux (x86_64)**: `TWM-loader-linux-x86_64`
            
            ### Manual Downloads (main binary)
            - **Linux (x86_64)**: `twm-linux-x86_64`
            
            ### Installation
            
            **Linux (using loader):**
            ```bash
            chmod +x TWM-loader-linux-x86_64
            chmod +x twm-linux-x86_64
            ./TWM-loader-linux-x86_64
            ```
            
            See [README.md](https://github.com/froumes/escrow/blob/main/README.md) for usage instructions.
          files: |
            ./artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

